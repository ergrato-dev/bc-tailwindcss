<!DOCTYPE html>
<!--
  Script anti-flash: corre ANTES de renderizar cualquier contenido.
  Equivale al script que pondríamos en app/layout.jsx de Next.js.
-->
<script>
  if (localStorage.theme === 'dark' ||
    (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark')
  }
</script>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 02 — Next.js + Tailwind (Simulado)</title>
  <!--
    En Next.js real: app/globals.css contiene @import "tailwindcss"
    importado en app/layout.jsx. Aquí usamos el CDN para el mismo efecto.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          // En Next.js real: next/font expone esto como CSS variable
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <!--
    En Next.js real importarías la fuente con:
      import { Inter } from 'next/font/google'
    Aquí la cargamos con <link> para simular el mismo resultado.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
