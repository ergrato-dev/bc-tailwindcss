  <!-- Toggle de dark mode -->
  <div class="fixed top-4 right-4 z-50">
    <button id="theme-toggle" aria-label="Cambiar modo de color" class="p-2 rounded-lg border border-gray-200 dark:border-gray-800
             bg-white dark:bg-gray-900
             hover:bg-gray-50 dark:hover:bg-gray-800
             transition-colors duration-200
             outline-none focus-visible:ring-2 focus-visible:ring-sky-500">
      <span class="dark:hidden text-sm">🌙</span>
      <span class="hidden dark:inline text-sm">☀️</span>
    </button>
  </div>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function () {
      const isDark = document.documentElement.classList.toggle('dark')
      localStorage.setItem('theme', isDark ? 'dark' : 'light')
    })
    // Restaurar preferencia
    if (localStorage.theme === 'dark' ||
      (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    }
  </script>
