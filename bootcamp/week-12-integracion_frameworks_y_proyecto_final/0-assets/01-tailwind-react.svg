<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="860" height="480" fill="#030712"/>

  <!-- Title bar -->
  <rect width="860" height="52" fill="#111827"/>
  <text x="30" y="32" font-size="14" font-weight="700" fill="#F9FAFB" letter-spacing="0.5">TailwindCSS + React</text>
  <text x="30" y="46" font-size="10" fill="#6B7280">Integración, cn() helper y variantes de componentes</text>

  <!-- ===== PANEL 1: class vs className ===== -->
  <rect x="20" y="72" width="255" height="185" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="36" y="95" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">JSX: class vs className</text>

  <!-- Error box -->
  <rect x="36" y="105" width="222" height="66" rx="6" fill="#0F172A" stroke="#991B1B" stroke-width="1"/>
  <text x="48" y="122" font-size="9" fill="#F87171" font-weight="600">❌  HTML  →  class</text>
  <text x="48" y="138" font-size="9.5" fill="#94A3B8" font-family="'Courier New', monospace">&lt;div</text>
  <text x="68" y="150" font-size="9.5" fill="#F87171" font-family="'Courier New', monospace">class="flex gap-4"</text>
  <text x="48" y="162" font-size="9.5" fill="#94A3B8" font-family="'Courier New', monospace">&gt;</text>

  <!-- OK box -->
  <rect x="36" y="180" width="222" height="66" rx="6" fill="#0F172A" stroke="#166534" stroke-width="1"/>
  <text x="48" y="197" font-size="9" fill="#34D399" font-weight="600">✅  JSX  →  className</text>
  <text x="48" y="213" font-size="9.5" fill="#94A3B8" font-family="'Courier New', monospace">&lt;div</text>
  <text x="68" y="225" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">className="flex gap-4"</text>
  <text x="48" y="237" font-size="9.5" fill="#94A3B8" font-family="'Courier New', monospace">&gt;</text>

  <!-- Warning note -->
  <text x="36" y="266" font-size="9" fill="#6B7280">React avisa: "Did you mean className?"</text>

  <!-- ===== PANEL 2: cn() helper ===== -->
  <rect x="295" y="72" width="270" height="185" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="311" y="95" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">Helper cn() — lib/utils.js</text>

  <!-- Code block -->
  <rect x="311" y="105" width="235" height="140" rx="6" fill="#0F172A"/>
  <!-- line 1 -->
  <text x="323" y="122" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">import</text>
  <text x="361" y="122" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">{ clsx }</text>
  <text x="407" y="122" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">from</text>
  <text x="433" y="122" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">'clsx'</text>
  <!-- line 2 -->
  <text x="323" y="137" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">import</text>
  <text x="361" y="137" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">{ twMerge }</text>
  <text x="420" y="137" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">from</text>
  <!-- line 2b -->
  <text x="323" y="150" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">  'tailwind-merge'</text>
  <!-- line 3 blank -->
  <!-- line 4 -->
  <text x="323" y="168" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">export function</text>
  <text x="418" y="168" font-size="9.5" fill="#38BDF8" font-family="'Courier New', monospace">cn</text>
  <text x="430" y="168" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">(...inputs) {</text>
  <!-- line 5 -->
  <text x="335" y="182" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">return</text>
  <text x="370" y="182" font-size="9.5" fill="#38BDF8" font-family="'Courier New', monospace">twMerge</text>
  <text x="413" y="182" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">(</text>
  <text x="419" y="182" font-size="9.5" fill="#38BDF8" font-family="'Courier New', monospace">clsx</text>
  <text x="441" y="182" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">(inputs))</text>
  <!-- line 6 -->
  <text x="323" y="196" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">}</text>
  <!-- usage example -->
  <line x1="323" y1="206" x2="533" y2="206" stroke="#374151" stroke-width="1"/>
  <text x="323" y="218" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// Uso:</text>
  <text x="323" y="232" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">cn(</text>
  <text x="341" y="232" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">'px-4'</text>
  <text x="375" y="232" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">, isActive &amp;&amp;</text>
  <text x="454" y="232" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">'bg-sky-500'</text>
  <text x="523" y="232" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">)</text>

  <!-- ===== PANEL 3: Button variants ===== -->
  <rect x="585" y="72" width="255" height="185" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="601" y="95" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">Componente con variantes</text>

  <!-- Code: variants object -->
  <rect x="601" y="105" width="220" height="145" rx="6" fill="#0F172A"/>
  <text x="613" y="122" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">const</text>
  <text x="640" y="122" font-size="9.5" fill="#38BDF8" font-family="'Courier New', monospace">variants</text>
  <text x="686" y="122" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">= {</text>

  <text x="625" y="136" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">primary:</text>
  <text x="672" y="136" font-size="8.5" fill="#F9FAFB" font-family="'Courier New', monospace">'bg-sky-500 text-white</text>
  <text x="625" y="148" font-size="8.5" fill="#F9FAFB" font-family="'Courier New', monospace">hover:bg-sky-600',</text>

  <text x="625" y="162" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">danger:</text>
  <text x="672" y="162" font-size="8.5" fill="#F9FAFB" font-family="'Courier New', monospace">'bg-red-500 text-white</text>
  <text x="625" y="174" font-size="8.5" fill="#F9FAFB" font-family="'Courier New', monospace">hover:bg-red-600',</text>

  <text x="613" y="187" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">}</text>

  <!-- Separator -->
  <line x1="613" y1="196" x2="808" y2="196" stroke="#374151" stroke-width="1"/>

  <!-- Button export -->
  <text x="613" y="210" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">export function</text>
  <text x="711" y="210" font-size="9.5" fill="#38BDF8" font-family="'Courier New', monospace">Button</text>
  <text x="747" y="210" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">({ variant,</text>
  <text x="613" y="224" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">className, ...props }) {</text>
  <text x="625" y="238" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">return</text>
  <text x="658" y="238" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">&lt;button</text>

  <!-- ===== BOTTOM STRIP: setup commands ===== -->
  <rect x="20" y="277" width="820" height="40" rx="8" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="36" y="293" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">$</text>
  <text x="46" y="293" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">pnpm add -D tailwindcss @tailwindcss/vite</text>
  <text x="350" y="293" font-size="10" fill="#374151" font-family="'Courier New', monospace">·</text>
  <text x="362" y="293" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">pnpm add clsx tailwind-merge</text>
  <text x="36" y="308" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">// vite.config.js: import tailwindcss from '@tailwindcss/vite' → plugins: [tailwindcss()]</text>

  <!-- ===== BOTTOM PANELS: Purging warning ===== -->
  <rect x="20" y="330" width="400" height="130" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="36" y="353" font-size="11" font-weight="600" fill="#F87171" letter-spacing="0.5">❌ Purging Trap — Clase dinámica</text>
  <rect x="36" y="362" width="368" height="88" rx="6" fill="#0F172A"/>
  <text x="48" y="379" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// Tailwind NO detecta esta clase:</text>
  <text x="48" y="393" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">const</text>
  <text x="77" y="393" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">color</text>
  <text x="103" y="393" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">=</text>
  <text x="113" y="393" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">'sky'</text>
  <text x="48" y="410" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">&lt;div className={`bg-</text>
  <text x="176" y="410" font-size="9.5" fill="#F87171" font-family="'Courier New', monospace">${color}</text>
  <text x="214" y="410" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">-500`}&gt;</text>
  <text x="48" y="432" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// bg-sky-500 se ELIMINA del bundle final</text>

  <rect x="440" y="330" width="400" height="130" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="456" y="353" font-size="11" font-weight="600" fill="#34D399" letter-spacing="0.5">✅ Purging Safe — Mapa de clases</text>
  <rect x="456" y="362" width="368" height="88" rx="6" fill="#0F172A"/>
  <text x="468" y="379" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// Clases completas: Tailwind las detecta</text>
  <text x="468" y="393" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">const</text>
  <text x="497" y="393" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">colors = {</text>
  <text x="480" y="407" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">sky:</text>
  <text x="504" y="407" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">'bg-sky-500',</text>
  <text x="480" y="420" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">red:</text>
  <text x="504" y="420" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">'bg-red-500' }</text>
  <text x="468" y="436" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">&lt;div className={colors[color]}&gt;</text>

  <!-- Footer label -->
  <text x="30" y="470" font-size="9" fill="#374151">Semana 12 · Bootcamp TailwindCSS Zero to Hero</text>
  <text x="700" y="470" font-size="9" fill="#374151">tailwindcss.com/docs</text>

</svg>
