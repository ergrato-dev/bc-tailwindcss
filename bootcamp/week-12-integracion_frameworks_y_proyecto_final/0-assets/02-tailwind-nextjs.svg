<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="860" height="500" fill="#030712"/>

  <!-- Title bar -->
  <rect width="860" height="52" fill="#111827"/>
  <text x="30" y="32" font-size="14" font-weight="700" fill="#F9FAFB" letter-spacing="0.5">TailwindCSS + Next.js App Router</text>
  <text x="30" y="46" font-size="10" fill="#6B7280">Estructura de archivos, Server vs Client Components, anti-flash script</text>

  <!-- ===== PANEL 1: App Router file tree ===== -->
  <rect x="20" y="72" width="230" height="240" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="36" y="95" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">App Router — Estructura</text>

  <!-- Tree -->
  <text x="46" y="116" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">app/</text>
  <text x="56" y="132" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">├──</text>
  <text x="82" y="132" font-size="10" fill="#818CF8" font-family="'Courier New', monospace">layout.jsx</text>
  <text x="162" y="132" font-size="9" fill="#4B5563">← Root Layout</text>
  <text x="56" y="148" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">├──</text>
  <text x="82" y="148" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">page.jsx</text>
  <text x="152" y="148" font-size="9" fill="#4B5563">← Home page</text>
  <text x="56" y="164" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">├──</text>
  <text x="82" y="164" font-size="10" fill="#34D399" font-family="'Courier New', monospace">globals.css</text>
  <text x="162" y="164" font-size="9" fill="#4B5563">← @import TW</text>
  <text x="56" y="180" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">└──</text>
  <text x="82" y="180" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">about/</text>
  <text x="93" y="196" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">└──</text>
  <text x="118" y="196" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">page.jsx</text>

  <text x="46" y="218" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">components/</text>
  <text x="56" y="234" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">├──</text>
  <text x="82" y="234" font-size="10" fill="#F9FAFB" font-family="'Courier New', monospace">Hero.jsx</text>
  <text x="152" y="234" font-size="9" fill="#4B5563">← Server</text>
  <text x="56" y="250" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">├──</text>
  <text x="82" y="250" font-size="10" fill="#F87171" font-family="'Courier New', monospace">Navbar.jsx</text>
  <text x="156" y="250" font-size="9" fill="#4B5563">← Client</text>
  <text x="56" y="266" font-size="10" fill="#6B7280" font-family="'Courier New', monospace">└──</text>
  <text x="82" y="266" font-size="10" fill="#F9FAFB" font-family="'Courier New', monospace">ui/</text>

  <text x="46" y="290" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">lib/utils.js</text>
  <text x="152" y="290" font-size="9" fill="#4B5563">← cn()</text>
  <text x="46" y="306" font-size="10" fill="#38BDF8" font-family="'Courier New', monospace">tailwind.config.js</text>

  <!-- ===== PANEL 2: Server vs Client ===== -->
  <rect x="270" y="72" width="320" height="240" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="286" y="95" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">Server vs Client Component</text>

  <!-- Table header -->
  <rect x="286" y="105" width="135" height="24" rx="4" fill="#1F2937"/>
  <rect x="429" y="105" width="143" height="24" rx="4" fill="#1F2937"/>
  <text x="294" y="121" font-size="9.5" fill="#F9FAFB" font-weight="600">Server Component</text>
  <text x="437" y="121" font-size="9.5" fill="#F9FAFB" font-weight="600">Client Component</text>

  <!-- Rows -->
  <text x="294" y="144" font-size="9" fill="#6B7280">Directiva</text>
  <text x="437" y="144" font-size="9" fill="#F87171" font-family="'Courier New', monospace">'use client'</text>

  <text x="294" y="162" font-size="9" fill="#6B7280">Por defecto</text>
  <text x="437" y="162" font-size="9" fill="#F87171">No, requiere declararla</text>

  <text x="294" y="180" font-size="9" fill="#6B7280">useState / useEffect</text>
  <text x="294" y="192" font-size="9" fill="#F87171">❌ No</text>
  <text x="437" y="180" font-size="9" fill="#6B7280">useState / useEffect</text>
  <text x="437" y="192" font-size="9" fill="#34D399">✅ Sí</text>

  <text x="294" y="210" font-size="9" fill="#6B7280">Event handlers</text>
  <text x="294" y="222" font-size="9" fill="#F87171">❌ No</text>
  <text x="437" y="210" font-size="9" fill="#6B7280">Event handlers</text>
  <text x="437" y="222" font-size="9" fill="#34D399">✅ Sí</text>

  <text x="294" y="240" font-size="9" fill="#6B7280">async/await</text>
  <text x="294" y="252" font-size="9" fill="#34D399">✅ Sí</text>
  <text x="437" y="240" font-size="9" fill="#6B7280">async/await</text>
  <text x="437" y="252" font-size="9" fill="#F87171">❌ No</text>

  <text x="294" y="270" font-size="9" fill="#6B7280">localStorage / DOM</text>
  <text x="294" y="282" font-size="9" fill="#F87171">❌ No</text>
  <text x="437" y="270" font-size="9" fill="#6B7280">localStorage / DOM</text>
  <text x="437" y="282" font-size="9" fill="#34D399">✅ Sí</text>

  <text x="294" y="300" font-size="9" fill="#6B7280">Tailwind classes</text>
  <text x="294" y="312" font-size="9" fill="#34D399">✅ Sí</text>
  <text x="437" y="300" font-size="9" fill="#6B7280">Tailwind classes</text>
  <text x="437" y="312" font-size="9" fill="#34D399">✅ Sí</text>

  <!-- ===== PANEL 3: Anti-flash + PostCSS ===== -->
  <rect x="610" y="72" width="230" height="240" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="626" y="95" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">Anti-flash script</text>

  <!-- Anti-flash code -->
  <rect x="626" y="105" width="196" height="130" rx="6" fill="#0F172A"/>
  <text x="638" y="120" font-size="8.5" fill="#6B7280" font-family="'Courier New', monospace">// app/layout.jsx &lt;head&gt;</text>
  <text x="638" y="134" font-size="9" fill="#F9FAFB" font-family="'Courier New', monospace">&lt;script</text>
  <text x="650" y="148" font-size="9" fill="#818CF8" font-family="'Courier New', monospace">dangerouslySetInnerHTML</text>
  <text x="650" y="162" font-size="9" fill="#F9FAFB" font-family="'Courier New', monospace">={{ __html: `</text>
  <text x="660" y="175" font-size="8.5" fill="#34D399" font-family="'Courier New', monospace">if(localStorage.theme</text>
  <text x="660" y="187" font-size="8.5" fill="#34D399" font-family="'Courier New', monospace">==='dark'){</text>
  <text x="670" y="198" font-size="8.5" fill="#38BDF8" font-family="'Courier New', monospace">document.documentElement</text>
  <text x="670" y="209" font-size="8.5" fill="#38BDF8" font-family="'Courier New', monospace">.classList.add('dark')</text>
  <text x="638" y="223" font-size="9" fill="#F9FAFB" font-family="'Courier New', monospace">` }} /&gt;</text>

  <!-- suppressHydrationWarning note -->
  <rect x="626" y="244" width="196" height="28" rx="6" fill="#1F2937"/>
  <text x="638" y="256" font-size="9" fill="#F9FAFB" font-family="'Courier New', monospace">&lt;html</text>
  <text x="668" y="256" font-size="9" fill="#818CF8" font-family="'Courier New', monospace">suppressHydrationWarning</text>
  <text x="638" y="268" font-size="9" fill="#6B7280" font-family="'Courier New', monospace">lang="es"&gt;</text>

  <!-- PostCSS -->
  <text x="626" y="300" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">postcss.config.mjs</text>
  <rect x="626" y="308" width="196" height="38" rx="6" fill="#0F172A"/>
  <text x="638" y="323" font-size="9" fill="#818CF8" font-family="'Courier New', monospace">export default {</text>
  <text x="650" y="337" font-size="9" fill="#F9FAFB" font-family="'Courier New', monospace">plugins: {</text>
  <text x="662" y="348" font-size="9" fill="#34D399" font-family="'Courier New', monospace">tailwindcss: {} } }</text>

  <!-- ===== BOTTOM: next/font ===== -->
  <rect x="20" y="332" width="820" height="130" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="36" y="355" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">next/font — Fuentes con zero layout shift</text>

  <!-- Code left -->
  <rect x="36" y="365" width="370" height="88" rx="6" fill="#0F172A"/>
  <text x="48" y="380" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">import</text>
  <text x="79" y="380" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">{ Inter }</text>
  <text x="120" y="380" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">from</text>
  <text x="143" y="380" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">'next/font/google'</text>
  <text x="48" y="396" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">const</text>
  <text x="79" y="396" font-size="9.5" fill="#38BDF8" font-family="'Courier New', monospace">inter</text>
  <text x="106" y="396" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">= Inter({ subsets: [</text>
  <text x="230" y="396" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">'latin'</text>
  <text x="268" y="396" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">],</text>
  <text x="68" y="410" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">variable:</text>
  <text x="120" y="410" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">'--font-inter'</text>
  <text x="202" y="410" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">})</text>

  <text x="48" y="430" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// En layout.jsx:</text>
  <text x="48" y="444" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">&lt;body className={inter.className}&gt;</text>

  <!-- Right: tailwind config -->
  <rect x="426" y="365" width="395" height="88" rx="6" fill="#0F172A"/>
  <text x="438" y="380" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// tailwind.config.js — usar como CSS variable</text>
  <text x="438" y="396" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">theme</text>
  <text x="468" y="396" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">: { extend: { fontFamily: {</text>
  <text x="450" y="410" font-size="9.5" fill="#34D399" font-family="'Courier New', monospace">sans:</text>
  <text x="477" y="410" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">['var(--font-inter)', 'system-ui'] } } }</text>
  <text x="438" y="428" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// Resultado: font-sans usará Inter con fallback correcto</text>
  <text x="438" y="444" font-size="9.5" fill="#818CF8" font-family="'Courier New', monospace">&lt;body className={</text>
  <text x="537" y="444" font-size="9.5" fill="#F9FAFB" font-family="'Courier New', monospace">`${inter.variable} font-sans`}&gt;</text>

  <!-- Footer label -->
  <text x="30" y="492" font-size="9" fill="#374151">Semana 12 · Bootcamp TailwindCSS Zero to Hero</text>
  <text x="700" y="492" font-size="9" fill="#374151">nextjs.org/docs/app</text>

</svg>
