<!DOCTYPE html>
<!--
  Script anti-flash: aplica dark mode ANTES de que se renderice cualquier contenido.
  En Next.js: lo pondrías con dangerouslySetInnerHTML en app/layout.jsx
-->
<script>
  if (localStorage.theme === 'dark' ||
    (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark')
  }
</script>
