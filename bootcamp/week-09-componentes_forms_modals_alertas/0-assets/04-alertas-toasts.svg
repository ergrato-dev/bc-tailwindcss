<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#030712"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#F9FAFB" font-size="18" font-weight="700">Alertas, Toasts y Banners — Variantes Semánticas</text>
  <text x="450" y="64" text-anchor="middle" fill="#6B7280" font-size="12">TailwindCSS Semana 9</text>

  <!-- ============ ALERTAS INLINE ============ -->
  <text x="60" y="98" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">ALERTAS INLINE — 4 VARIANTES SEMÁNTICAS</text>

  <!-- SUCCESS -->
  <rect x="60" y="108" width="370" height="56" rx="10" fill="#022C22" stroke="#065F46" stroke-width="1" opacity="0.8"/>
  <rect x="60" y="108" width="370" height="56" rx="10" fill="none" stroke="#059669" stroke-width="1" opacity="0.5"/>
  <!-- Check icon circle -->
  <circle cx="88" cy="136" r="12" fill="#059669" opacity="0.2"/>
  <polyline points="83,136 87,140 94,131" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="110" y="131" fill="#6EE7B7" font-size="12" font-weight="600">¡Cambios guardados!</text>
  <text x="110" y="148" fill="#34D399" font-size="11" opacity="0.8">Tu perfil ha sido actualizado correctamente.</text>
  <!-- X dismiss -->
  <line x1="415" x2="421" y1="131" y2="137" stroke="#34D399" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="421" x2="415" y1="131" y2="137" stroke="#34D399" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Formula label -->
  <text x="444" y="126" fill="#34D399" font-size="10">bg-emerald-500/10</text>
  <text x="444" y="139" fill="#34D399" font-size="10">border-emerald-500/20</text>
  <text x="444" y="152" fill="#34D399" font-size="10">text-emerald-300</text>

  <!-- ERROR -->
  <rect x="60" y="174" width="370" height="56" rx="10" fill="#1C0A0A" stroke="#7F1D1D" stroke-width="1" opacity="0.8"/>
  <rect x="60" y="174" width="370" height="56" rx="10" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.5"/>
  <!-- X icon circle -->
  <circle cx="88" cy="202" r="12" fill="#EF4444" opacity="0.2"/>
  <line x1="84" x2="92" y1="198" y2="206" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" x2="84" y1="198" y2="206" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="110" y="197" fill="#FCA5A5" font-size="12" font-weight="600">Error al procesar el pago</text>
  <text x="110" y="214" fill="#F87171" font-size="11" opacity="0.8">La tarjeta fue rechazada. Verifica los datos.</text>
  <!-- X dismiss -->
  <line x1="415" x2="421" y1="197" y2="203" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="421" x2="415" y1="197" y2="203" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Formula label -->
  <text x="444" y="192" fill="#F87171" font-size="10">bg-red-500/10</text>
  <text x="444" y="205" fill="#F87171" font-size="10">border-red-500/20</text>
  <text x="444" y="218" fill="#F87171" font-size="10">text-red-300</text>

  <!-- WARNING -->
  <rect x="60" y="240" width="370" height="56" rx="10" fill="#1C1300" stroke="#78350F" stroke-width="1" opacity="0.8"/>
  <rect x="60" y="240" width="370" height="56" rx="10" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
  <!-- Triangle icon -->
  <polygon points="88,219 78,237 98,237" fill="#F59E0B" opacity="0.2" transform="translate(0,50)"/>
  <text x="86" y="275" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">!</text>
  <!-- Text -->
  <text x="110" y="263" fill="#FDE68A" font-size="12" font-weight="600">Sesión próxima a expirar</text>
  <text x="110" y="280" fill="#FCD34D" font-size="11" opacity="0.8">Tu sesión expira en 5 minutos. Guarda el trabajo.</text>
  <!-- Formula label -->
  <text x="444" y="258" fill="#FCD34D" font-size="10">bg-amber-500/10</text>
  <text x="444" y="271" fill="#FCD34D" font-size="10">border-amber-500/20</text>
  <text x="444" y="284" fill="#FCD34D" font-size="10">text-amber-300</text>

  <!-- INFO -->
  <rect x="60" y="306" width="370" height="56" rx="10" fill="#030E1C" stroke="#0C4A6E" stroke-width="1" opacity="0.8"/>
  <rect x="60" y="306" width="370" height="56" rx="10" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
  <!-- Info icon circle -->
  <circle cx="88" cy="334" r="12" fill="#0EA5E9" opacity="0.2"/>
  <text x="88" y="339" text-anchor="middle" fill="#38BDF8" font-size="14" font-weight="700">i</text>
  <!-- Text -->
  <text x="110" y="329" fill="#BAE6FD" font-size="12" font-weight="600">Nueva versión disponible</text>
  <text x="110" y="346" fill="#38BDF8" font-size="11" opacity="0.8">TailwindCSS v4.2 mejora el rendimiento un 30%.</text>
  <!-- Formula label -->
  <text x="444" y="324" fill="#38BDF8" font-size="10">bg-sky-500/10</text>
  <text x="444" y="337" fill="#38BDF8" font-size="10">border-sky-500/20</text>
  <text x="444" y="350" fill="#38BDF8" font-size="10">text-sky-300</text>

  <!-- Divider -->
  <line x1="60" x2="840" y1="378" y2="378" stroke="#1F2937" stroke-width="1"/>

  <!-- ============ TOAST ============ -->
  <text x="60" y="405" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">TOAST (fixed bottom-4 right-4 z-50)</text>

  <!-- Page mockup frame -->
  <rect x="60" y="416" width="350" height="120" rx="8" fill="#0A0F1A" stroke="#1F2937" stroke-width="1"/>
  <text x="76" y="436" fill="#1F2937" font-size="10">contenido de la página...</text>

  <!-- Toast card in bottom-right of mockup -->
  <rect x="192" y="454" width="200" height="70" rx="8" fill="#111827" stroke="#1F2937" stroke-width="1.5"/>
  <!-- Shadow effect suggestion -->
  <rect x="195" y="457" width="200" height="70" rx="8" fill="#000000" opacity="0.3"/>
  <rect x="192" y="454" width="200" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <!-- Success icon -->
  <rect x="201" y="463" width="22" height="22" rx="6" fill="#059669" opacity="0.2"/>
  <polyline points="207,474 210,477 217,469" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="230" y="473" fill="#FFFFFF" font-size="11" font-weight="600">Archivo guardado</text>
  <text x="230" y="487" fill="#9CA3AF" font-size="10">proyecto.html guardado.</text>
  <!-- X -->
  <line x1="375" x2="380" y1="462" y2="467" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="380" x2="375" y1="462" y2="467" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Position labels -->
  <text x="72" y="495" fill="#374151" font-size="10">bottom-4</text>
  <text x="72" y="508" fill="#374151" font-size="10">right-4</text>
  <line x1="188" x2="180" y1="494" y2="502" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ============ BANNER ============ -->
  <text x="460" y="405" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">BANNER (full-width)</text>

  <!-- Banner -->
  <rect x="460" y="416" width="370" height="40" rx="8" fill="#030E1C" stroke="#0C4A6E" stroke-width="1"/>
  <rect x="460" y="416" width="370" height="40" rx="8" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
  <text x="644" y="440" text-anchor="middle" fill="#BAE6FD" font-size="12">🎉 <tspan font-weight="700">Novedad:</tspan> Tailwind v4 disponible. <tspan fill="#38BDF8" text-decoration="underline">Ver →</tspan></text>
  <!-- Dismiss -->
  <line x1="814" x2="820" y1="431" y2="437" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="820" x2="814" y1="431" y2="437" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Banner code -->
  <text x="460" y="475" fill="#6B7280" font-size="11">relative border-b border-sky-500/20</text>
  <text x="460" y="490" fill="#6B7280" font-size="11">bg-sky-500/10 px-4 py-3 text-center</text>
  <text x="460" y="510" fill="#9CA3AF" font-size="11">Dismiss: absolute right-3 top-1/2</text>
  <text x="460" y="524" fill="#9CA3AF" font-size="11">-translate-y-1/2 → centrado vertical</text>

  <!-- A11y note -->
  <rect x="460" y="534" width="370" height="20" rx="4" fill="#111827"/>
  <text x="470" y="547" fill="#38BDF8" font-size="10">role="alert" + aria-live="polite" + aria-label en dismiss</text>
</svg>
