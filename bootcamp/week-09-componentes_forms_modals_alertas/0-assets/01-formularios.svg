<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#030712"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#F9FAFB" font-size="18" font-weight="700">Anatomía de Formularios — Inputs, Select, Checkbox y Radio</text>
  <text x="450" y="64" text-anchor="middle" fill="#6B7280" font-size="12">TailwindCSS Semana 9</text>

  <!-- ============ INPUT DE TEXTO ============ -->
  <text x="60" y="108" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">INPUT DE TEXTO</text>

  <!-- Label -->
  <text x="60" y="132" fill="#D1D5DB" font-size="12" font-weight="500">Email</text>
  <text x="97" y="132" fill="#F87171" font-size="12">*</text>

  <!-- Input box -->
  <rect x="60" y="140" width="250" height="40" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
  <text x="76" y="164" fill="#6B7280" font-size="13">tu@email.com</text>

  <!-- Labels -->
  <line x1="60" x2="60" y1="175" y2="195" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="64" y="205" fill="#6B7280" font-size="10">border-gray-700 bg-gray-800 px-4 py-2.5</text>

  <!-- ============ INPUT FOCUS ============ -->
  <text x="360" y="108" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">ESTADO FOCUS</text>

  <!-- Label -->
  <text x="360" y="132" fill="#D1D5DB" font-size="12" font-weight="500">Email</text>

  <!-- Input box with focus ring -->
  <rect x="360" y="140" width="250" height="40" rx="8" fill="#1F2937" stroke="#38BDF8" stroke-width="1.5"/>
  <!-- Focus ring (outer glow) -->
  <rect x="356" y="136" width="258" height="48" rx="11" fill="none" stroke="#38BDF8" stroke-width="2" opacity="0.25"/>
  <text x="376" y="164" fill="#F9FAFB" font-size="13">ana@email.com</text>

  <!-- Focus ring label -->
  <text x="636" y="155" fill="#38BDF8" font-size="10">focus:border-sky-500</text>
  <text x="636" y="169" fill="#38BDF8" font-size="10">focus:ring-2</text>
  <text x="636" y="183" fill="#38BDF8" font-size="10">focus:ring-sky-500/20</text>
  <line x1="618" x2="636" y1="160" y2="160" stroke="#38BDF8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Divider -->
  <line x1="60" x2="840" y1="225" y2="225" stroke="#1F2937" stroke-width="1"/>

  <!-- ============ SELECT ============ -->
  <text x="60" y="255" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">SELECT</text>

  <!-- Label -->
  <text x="60" y="279" fill="#D1D5DB" font-size="12" font-weight="500">País</text>

  <!-- Select box -->
  <rect x="60" y="287" width="200" height="40" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
  <text x="76" y="311" fill="#F9FAFB" font-size="13">México</text>
  <!-- Custom arrow -->
  <polyline points="238,305 244,311 250,305" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- appearance-none label -->
  <text x="60" y="345" fill="#6B7280" font-size="10">appearance-none + SVG flecha personalizada</text>

  <!-- ============ TEXTAREA ============ -->
  <text x="320" y="255" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">TEXTAREA</text>

  <text x="320" y="279" fill="#D1D5DB" font-size="12" font-weight="500">Mensaje</text>
  <rect x="320" y="287" width="220" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
  <text x="336" y="308" fill="#6B7280" font-size="12">Escribe tu mensaje...</text>
  <!-- Resize indicator (crossed out) -->
  <line x1="516" x2="540" y1="343" y2="367" stroke="#374151" stroke-width="2"/>
  <line x1="528" x2="540" y1="355" y2="367" stroke="#374151" stroke-width="2"/>
  <text x="552" y="362" fill="#F87171" font-size="9">resize-none</text>
  <text x="320" y="385" fill="#6B7280" font-size="10">resize-none rows="4"</text>

  <!-- ============ CHECKBOX ============ -->
  <text x="590" y="255" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">CHECKBOX</text>

  <!-- Unchecked -->
  <rect x="590" y="275" width="18" height="18" rx="4" fill="#1F2937" stroke="#4B5563" stroke-width="1.5"/>
  <text x="616" y="288" fill="#9CA3AF" font-size="12">Opción A</text>

  <!-- Checked -->
  <rect x="590" y="305" width="18" height="18" rx="4" fill="#0EA5E9" stroke="#38BDF8" stroke-width="1.5"/>
  <polyline points="594,314 598,318 606,307" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="616" y="318" fill="#F9FAFB" font-size="12">Opción B</text>

  <text x="590" y="345" fill="#6B7280" font-size="10">h-4 w-4 rounded</text>
  <text x="590" y="358" fill="#6B7280" font-size="10">text-sky-500</text>

  <!-- ============ RADIO ============ -->
  <text x="730" y="255" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">RADIO</text>

  <!-- Unselected -->
  <circle cx="742" cy="284" r="8" fill="#1F2937" stroke="#4B5563" stroke-width="1.5"/>
  <text x="756" y="288" fill="#9CA3AF" font-size="12">Plan Free</text>

  <!-- Selected -->
  <circle cx="742" cy="314" r="8" fill="#1F2937" stroke="#38BDF8" stroke-width="1.5"/>
  <circle cx="742" cy="314" r="4" fill="#38BDF8"/>
  <text x="756" y="318" fill="#F9FAFB" font-size="12">Plan Pro</text>

  <text x="730" y="345" fill="#6B7280" font-size="10">h-4 w-4</text>
  <text x="730" y="358" fill="#6B7280" font-size="10">text-sky-500</text>

  <!-- ============ DISABLED STATE ============ -->
  <text x="60" y="415" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">ESTADO DISABLED</text>

  <rect x="60" y="428" width="250" height="40" rx="8" fill="#111827" stroke="#1F2937" stroke-width="1.5" opacity="0.6"/>
  <text x="76" y="452" fill="#4B5563" font-size="13">@username</text>
  <!-- Lock icon simplified -->
  <rect x="277" y="440" width="12" height="10" rx="2" fill="none" stroke="#4B5563" stroke-width="1.5"/>
  <path d="M279 440 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#4B5563" stroke-width="1.5"/>

  <text x="330" y="448" fill="#6B7280" font-size="11">disabled:opacity-50</text>
  <text x="330" y="462" fill="#6B7280" font-size="11">disabled:cursor-not-allowed</text>
</svg>
