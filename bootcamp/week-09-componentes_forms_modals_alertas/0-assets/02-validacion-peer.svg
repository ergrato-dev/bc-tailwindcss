<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#030712"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#F9FAFB" font-size="18" font-weight="700">Validación de Formularios — Estados y Técnica peer</text>
  <text x="450" y="64" text-anchor="middle" fill="#6B7280" font-size="12">TailwindCSS Semana 9</text>

  <!-- ============ ESTADO DEFAULT ============ -->
  <text x="60" y="100" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">DEFAULT</text>

  <text x="60" y="124" fill="#D1D5DB" font-size="12" font-weight="500">Email</text>
  <rect x="60" y="132" width="220" height="40" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
  <text x="76" y="156" fill="#6B7280" font-size="13">tu@email.com</text>

  <text x="60" y="188" fill="#6B7280" font-size="10">border-gray-700</text>
  <text x="60" y="200" fill="#6B7280" font-size="10">focus:border-sky-500</text>
  <text x="60" y="212" fill="#6B7280" font-size="10">focus:ring-sky-500/20</text>

  <!-- ============ ESTADO ERROR ============ -->
  <text x="340" y="100" fill="#F87171" font-size="11" font-weight="600" letter-spacing="1">ERROR</text>

  <text x="340" y="124" fill="#D1D5DB" font-size="12" font-weight="500">Email</text>
  <rect x="340" y="132" width="220" height="40" rx="8" fill="#1F2937" stroke="#EF4444" stroke-width="1.5"/>
  <text x="356" y="156" fill="#F9FAFB" font-size="13">email-no-valido</text>
  <!-- Error icon -->
  <circle cx="540" cy="152" r="9" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <line x1="540" x2="540" y1="146" y2="152" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <circle cx="540" cy="156" r="1.5" fill="#F87171"/>

  <!-- Error message -->
  <text x="340" y="184" fill="#F87171" font-size="11">● Ingresa una dirección de email válida.</text>

  <text x="340" y="200" fill="#F87171" font-size="10">border-red-500</text>
  <text x="340" y="212" fill="#F87171" font-size="10">focus:ring-red-500/20</text>

  <!-- ============ ESTADO SUCCESS ============ -->
  <text x="620" y="100" fill="#34D399" font-size="11" font-weight="600" letter-spacing="1">SUCCESS</text>

  <text x="620" y="124" fill="#D1D5DB" font-size="12" font-weight="500">Email</text>
  <rect x="620" y="132" width="220" height="40" rx="8" fill="#1F2937" stroke="#10B981" stroke-width="1.5"/>
  <text x="636" y="156" fill="#F9FAFB" font-size="13">ana@email.com</text>
  <!-- Check icon -->
  <polyline points="817,147 822,153 830,144" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Success message -->
  <text x="620" y="184" fill="#34D399" font-size="11">✓ Email disponible y válido.</text>

  <text x="620" y="200" fill="#34D399" font-size="10">border-emerald-500</text>
  <text x="620" y="212" fill="#34D399" font-size="10">focus:ring-emerald-500/20</text>

  <!-- Divider -->
  <line x1="60" x2="840" y1="232" y2="232" stroke="#1F2937" stroke-width="1"/>

  <!-- ============ TÉCNICA PEER ============ -->
  <text x="60" y="262" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">TÉCNICA peer — VALIDACIÓN SIN JAVASCRIPT</text>

  <!-- Flow diagram -->
  <!-- Input peer -->
  <rect x="60" y="280" width="200" height="52" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="70" y="300" fill="#38BDF8" font-size="11" font-weight="600">&lt;input</text>
  <text x="70" y="315" fill="#D1D5DB" font-size="11">  class="<tspan fill="#34D399">peer</tspan>"</text>
  <text x="70" y="329" fill="#D1D5DB" font-size="11">  required /&gt;</text>

  <!-- Arrow -->
  <line x1="264" x2="308" y1="306" y2="306" stroke="#4B5563" stroke-width="1.5"/>
  <polygon points="308,302 316,306 308,310" fill="#4B5563"/>

  <!-- States box -->
  <rect x="316" y="272" width="160" height="68" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="326" y="292" fill="#9CA3AF" font-size="10" font-weight="600">ESTADO CSS</text>
  <circle cx="333" cy="308" r="4" fill="#EF4444"/>
  <text x="342" y="311" fill="#F87171" font-size="11">:invalid (vacío/mal formato)</text>
  <circle cx="333" cy="324" r="4" fill="#10B981"/>
  <text x="342" y="327" fill="#34D399" font-size="11">:valid (correcto)</text>
  <circle cx="333" cy="340" r="4" fill="#6B7280"/>
  <text x="342" y="343" fill="#9CA3AF" font-size="11">placeholder-shown</text>

  <!-- Arrow 2 -->
  <line x1="480" x2="524" y1="306" y2="306" stroke="#4B5563" stroke-width="1.5"/>
  <polygon points="524,302 532,306 524,310" fill="#4B5563"/>

  <!-- Message sibling box -->
  <rect x="532" y="280" width="220" height="52" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="542" y="300" fill="#38BDF8" font-size="11" font-weight="600">&lt;p</text>
  <text x="542" y="315" fill="#D1D5DB" font-size="10">  class="hidden</text>
  <text x="552" y="329" fill="#F87171" font-size="10">peer-invalid:block</text>
  <text x="552" y="342" fill="#6B7280" font-size="10">peer-placeholder-shown:hidden"</text>

  <!-- Sibling arrow label -->
  <text x="760" y="295" fill="#9CA3AF" font-size="10">Siguiente</text>
  <text x="760" y="308" fill="#9CA3AF" font-size="10">hermano</text>
  <text x="760" y="321" fill="#9CA3AF" font-size="10">en el DOM</text>
  <line x1="756" x2="752" y1="306" y2="306" stroke="#4B5563" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ============ COMPORTAMIENTO TABLA ============ -->
  <text x="60" y="380" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="1">LÓGICA DE VISIBILIDAD DEL MENSAJE</text>

  <!-- Table header -->
  <rect x="60" y="392" width="760" height="28" rx="4" fill="#111827"/>
  <text x="80" y="410" fill="#F9FAFB" font-size="11" font-weight="600">Estado del input</text>
  <text x="300" y="410" fill="#F9FAFB" font-size="11" font-weight="600">peer-invalid:</text>
  <text x="450" y="410" fill="#F9FAFB" font-size="11" font-weight="600">peer-placeholder-shown:</text>
  <text x="660" y="410" fill="#F9FAFB" font-size="11" font-weight="600">Resultado</text>

  <!-- Row 1 -->
  <rect x="60" y="420" width="760" height="26" rx="0" fill="#0A0F1A"/>
  <text x="80" y="436" fill="#D1D5DB" font-size="11">Vacío (recién cargado)</text>
  <text x="300" y="436" fill="#F87171" font-size="11">inválido</text>
  <text x="450" y="436" fill="#34D399" font-size="11">visible (placeholder on)</text>
  <text x="660" y="436" fill="#6B7280" font-size="11">hidden gana → OCULTO</text>

  <!-- Row 2 -->
  <rect x="60" y="446" width="760" height="26" rx="0" fill="#030712"/>
  <text x="80" y="462" fill="#D1D5DB" font-size="11">Texto inválido (ej. "abc")</text>
  <text x="300" y="462" fill="#F87171" font-size="11">inválido</text>
  <text x="450" y="462" fill="#6B7280" font-size="11">oculto (placeholder off)</text>
  <text x="660" y="462" fill="#F87171" font-size="11">block → VISIBLE</text>

  <!-- Row 3 -->
  <rect x="60" y="472" width="760" height="26" rx="0" fill="#0A0F1A"/>
  <text x="80" y="488" fill="#D1D5DB" font-size="11">Texto válido</text>
  <text x="300" y="488" fill="#34D399" font-size="11">válido</text>
  <text x="450" y="488" fill="#6B7280" font-size="11">oculto (placeholder off)</text>
  <text x="660" y="488" fill="#34D399" font-size="11">ni block ni hidden → OCULTO</text>

  <!-- Table border -->
  <rect x="60" y="392" width="760" height="106" rx="4" fill="none" stroke="#1F2937" stroke-width="1"/>
</svg>
