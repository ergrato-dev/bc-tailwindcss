  <script>
    tailwind.config = {
      theme: {
        extend: {
          keyframes: {
            'fade-in': {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },

            'fade-in': 'fade-in 0.4s ease-out forwards',

        },
