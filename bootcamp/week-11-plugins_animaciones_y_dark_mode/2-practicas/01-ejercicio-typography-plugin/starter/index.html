  --font-display: "Inter", sans-serif;

        max-w-none">

        <h1>Blog con Dark Mode</h1>

        <p>Este artículo demuestra cómo <code>prose-invert</code> adapta automáticamente todos los colores del plugin Typography para fondos oscuros.</p>

        <h2>¿Cómo funciona?</h2>

        <p>Con la clase <code>dark:prose-invert</code>, el plugin invierte su paleta de colores cuando el modo oscuro está activo:</p>

        <ul>
          <li>Texto principal: de <strong>gris oscuro</strong> a <strong>blanco</strong></li>
          <li>Headings: adaptados para fondos oscuros</li>
          <li>Links: colores que contrastan sobre fondos oscuros</li>
          <li>Código: fondos y colores invertidos</li>
        </ul>

        <blockquote>
          No necesitas definir colores individuales para dark mode en cada elemento del artículo.
        </blockquote>

        <h2>Código de ejemplo</h2>

        <pre><code>&lt;article class="prose dark:prose-invert"&gt;
  &lt;!-- Todo el contenido se adapta automáticamente --&gt;
&lt;/article&gt;</code></pre>

      </article>
    </div>
  </section>

  <script>
    // Inicializar tema — aplica antes de mostrar para evitar flash
    function initTheme() {
      const stored = localStorage.getItem('theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark')
        document.getElementById('theme-icon').textContent = '☀️'
        document.getElementById('theme-label').textContent = 'Modo claro'
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark')
      localStorage.setItem('theme', isDark ? 'dark' : 'light')
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙'
      document.getElementById('theme-label').textContent = isDark ? 'Modo claro' : 'Modo oscuro'
    }

    initTheme()
  </script>
