    tailwind.config = {
      darkMode: 'class',
    }
  </script>

    </p>

    <div class="flex items-center justify-between mb-6 p-4

                     border border-gray-200 dark:border-gray-700
                     hover:bg-gray-200 dark:hover:bg-gray-700
                     transition-colors"
              aria-label="Cambiar tema de color">
        <span id="toggle-icon">🌙</span>
        <span id="toggle-label">Modo oscuro</span>
      </button>
    </div>

    <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50 rounded-xl p-4">
      <p class="text-sm font-semibold text-amber-700 dark:text-amber-400">💡 Cómo probarlo</p>
      <ol class="mt-2 text-sm text-amber-600 dark:text-amber-300 space-y-1 list-decimal list-inside">
        <li>Cambia al modo oscuro con el botón</li>
        <li>Recarga la página (F5) — debe mantener el modo oscuro</li>
        <li>Cambia a modo claro y recarga — debe mantener el modo claro</li>
        <li>Elimina <code class="font-mono">theme</code> de localStorage y recarga — usará el SO</li>
      </ol>
    </div>
  </div>

  <script>
    // Función para inicializar el tema al cargar
    function initTheme() {
      const stored = localStorage.getItem('theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      const isDark = stored === 'dark' || (!stored && prefersDark)

      if (isDark) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
      updateUI(isDark)
    }

    // Función para actualizar el estado visual del botón
    function updateUI(isDark) {
      const source = isDark ? 'oscuro' : 'claro'
      const stored = localStorage.getItem('theme')
      const origin = stored ? 'localStorage' : 'sistema operativo'

      document.getElementById('theme-status').textContent =
        `Modo ${source} — guardado en ${origin}`
      document.getElementById('toggle-icon').textContent = isDark ? '☀️' : '🌙'
      document.getElementById('toggle-label').textContent = isDark ? 'Modo claro' : 'Modo oscuro'
    }

    // Toggle con persistencia
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark')
      localStorage.setItem('theme', isDark ? 'dark' : 'light')
      updateUI(isDark)
    }

    // Ejecutar al cargar
    initTheme()
  </script>
