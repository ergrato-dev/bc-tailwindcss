<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480">
  <defs>
    <style>
      text { font-family: Inter, 'Roboto', system-ui, sans-serif; }
      .code { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="480" fill="#030712"/>

  <!-- Title -->
  <text x="430" y="36" font-size="18" font-weight="700" fill="#F9FAFB" text-anchor="middle">Accesibilidad con TailwindCSS</text>
  <text x="430" y="54" font-size="11" fill="#6B7280" text-anchor="middle">sr-only · focus-visible: · contraste WCAG · motion-safe:</text>

  <!-- ======================== Q1: sr-only (top-left) ======================== -->
  <rect x="20" y="68" width="396" height="192" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <rect x="20" y="68" width="396" height="34" rx="12" fill="#0C2A0C"/>
  <rect x="20" y="90" width="396" height="12" fill="#0C2A0C"/>
  <text x="218" y="90" font-size="13" font-weight="700" fill="#4ADE80" text-anchor="middle">sr-only — Lectores de Pantalla</text>

  <!-- Comparison: before vs after -->
  <text x="36" y="120" font-size="10" font-weight="600" fill="#F87171">❌ Sin sr-only — lector dice "button"</text>
  <rect x="36" y="126" width="174" height="32" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <rect x="46" y="133" width="28" height="18" rx="4" fill="#374151"/>
  <text x="60" y="146" font-size="14" fill="#6B7280" text-anchor="middle">🔍</text>
  <rect x="80" y="133" width="28" height="18" rx="4" fill="#374151"/>
  <text x="94" y="146" font-size="14" fill="#6B7280" text-anchor="middle">♡</text>
  <rect x="114" y="133" width="28" height="18" rx="4" fill="#374151"/>
  <text x="128" y="146" font-size="14" fill="#6B7280" text-anchor="middle">↗</text>
  <text x="155" y="152" font-size="9" fill="#F87171" text-anchor="middle">? ? ?</text>

  <text x="220" y="120" font-size="10" font-weight="600" fill="#4ADE80">✅ Con sr-only / aria-label</text>
  <rect x="220" y="126" width="180" height="32" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <rect x="230" y="133" width="28" height="18" rx="4" fill="#374151"/>
  <text x="244" y="146" font-size="14" fill="#38BDF8" text-anchor="middle">🔍</text>
  <text x="244" y="162" font-size="7" fill="#38BDF8" text-anchor="middle" class="code">Buscar</text>
  <rect x="266" y="133" width="28" height="18" rx="4" fill="#374151"/>
  <text x="280" y="146" font-size="14" fill="#38BDF8" text-anchor="middle">♡</text>
  <text x="280" y="162" font-size="7" fill="#38BDF8" text-anchor="middle" class="code">Guardar</text>
  <rect x="302" y="133" width="28" height="18" rx="4" fill="#374151"/>
  <text x="316" y="146" font-size="14" fill="#38BDF8" text-anchor="middle">↗</text>
  <text x="316" y="162" font-size="7" fill="#38BDF8" text-anchor="middle" class="code">Compartir</text>

  <!-- Code examples -->
  <rect x="36" y="170" width="364" height="80" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="52" y="188" font-size="9" fill="#6B7280" class="code">&lt;!-- aria-label directamente en botón --&gt;</text>
  <text x="52" y="202" font-size="9" fill="#F9FAFB" class="code">&lt;button aria-label=<tspan fill="#FCD34D">"Buscar artículos"</tspan>&gt;</text>
  <text x="52" y="216" font-size="9" fill="#9CA3AF" class="code">  &lt;svg aria-hidden=<tspan fill="#F87171">"true"</tspan>&gt;...&lt;/svg&gt;</text>
  <text x="52" y="230" font-size="9" fill="#F9FAFB" class="code">&lt;/button&gt;</text>
  <text x="52" y="244" font-size="9" fill="#9CA3AF" class="code">&lt;span class=<tspan fill="#4ADE80">"sr-only"</tspan>&gt;Texto alternativo&lt;/span&gt;</text>

  <!-- ======================== Q2: focus-visible: (top-right) ======================== -->
  <rect x="444" y="68" width="396" height="192" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <rect x="444" y="68" width="396" height="34" rx="12" fill="#0C1A2E"/>
  <rect x="444" y="90" width="396" height="12" fill="#0C1A2E"/>
  <text x="642" y="90" font-size="13" font-weight="700" fill="#38BDF8" text-anchor="middle">focus-visible: — Foco por Teclado</text>

  <!-- Mouse vs Keyboard comparison -->
  <rect x="460" y="108" width="172" height="60" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="546" y="126" font-size="10" font-weight="600" fill="#F87171" text-anchor="middle">🖱 Mouse/Touch</text>
  <text x="546" y="140" font-size="9" fill="#9CA3AF" text-anchor="middle">focus: visible pero molesto</text>
  <rect x="474" y="148" width="144" height="14" rx="4" fill="#374151"/>
  <rect x="474" y="148" width="144" height="14" rx="4" fill="none" stroke="#38BDF870" stroke-width="2"/>
  <text x="546" y="160" font-size="9" fill="#9CA3AF" class="code" text-anchor="middle">focus:ring — siempre visible</text>

  <rect x="648" y="108" width="176" height="60" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="736" y="126" font-size="10" font-weight="600" fill="#4ADE80" text-anchor="middle">⌨️ Teclado (Tab)</text>
  <text x="736" y="140" font-size="9" fill="#9CA3AF" text-anchor="middle">focus-visible: ring claro</text>
  <rect x="662" y="148" width="148" height="14" rx="4" fill="#1E3A5F"/>
  <rect x="662" y="148" width="148" height="14" rx="4" fill="none" stroke="#38BDF8" stroke-width="2.5"/>
  <text x="736" y="160" font-size="9" fill="#38BDF8" class="code" text-anchor="middle">focus-visible:ring-2</text>

  <!-- Code -->
  <rect x="460" y="178" width="364" height="72" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="476" y="196" font-size="9" fill="#F87171" class="code">outline-none           ← quita el default del browser</text>
  <text x="476" y="210" font-size="9" fill="#38BDF8" class="code">focus-visible:ring-2   ← ring solo con teclado</text>
  <text x="476" y="224" font-size="9" fill="#38BDF8" class="code">focus-visible:ring-sky-500</text>
  <text x="476" y="238" font-size="9" fill="#38BDF8" class="code">focus-visible:ring-offset-2</text>

  <!-- Skip link note -->
  <text x="460" y="258" font-size="9" fill="#FCD34D">💡 Skip link: &lt;a href="#main" class="sr-only focus:not-sr-only"&gt;Saltar al contenido&lt;/a&gt;</text>

  <!-- ======================== Q3: WCAG Contrast (bottom-left) ======================== -->
  <rect x="20" y="278" width="396" height="190" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <rect x="20" y="278" width="396" height="34" rx="12" fill="#2A1A00"/>
  <rect x="20" y="300" width="396" height="12" fill="#2A1A00"/>
  <text x="218" y="300" font-size="13" font-weight="700" fill="#FCD34D" text-anchor="middle">Contraste WCAG AA (≥4.5:1)</text>

  <!-- Color contrast grid -->
  <text x="36" y="326" font-size="10" font-weight="600" fill="#9CA3AF">Sobre fondo blanco (#ffffff):</text>

  <!-- Bad contrast examples -->
  <rect x="36" y="332" width="110" height="32" rx="6" fill="#ffffff"/>
  <text x="91" y="352" font-size="11" fill="#9CA3AF" text-anchor="middle">gray-400</text>
  <rect x="36" y="366" width="110" height="14" rx="3" fill="#FECACA"/>
  <text x="91" y="377" font-size="9" fill="#DC2626" text-anchor="middle">2.5:1 ❌</text>

  <rect x="154" y="332" width="110" height="32" rx="6" fill="#ffffff"/>
  <text x="209" y="352" font-size="11" fill="#6B7280" text-anchor="middle">gray-500</text>
  <rect x="154" y="366" width="110" height="14" rx="3" fill="#FEF3C7"/>
  <text x="209" y="377" font-size="9" fill="#D97706" text-anchor="middle">4.6:1 ⚠️</text>

  <rect x="272" y="332" width="110" height="32" rx="6" fill="#ffffff"/>
  <text x="327" y="352" font-size="11" fill="#4B5563" text-anchor="middle">gray-600</text>
  <rect x="272" y="366" width="110" height="14" rx="3" fill="#D1FAE5"/>
  <text x="327" y="377" font-size="9" fill="#059669" text-anchor="middle">7.0:1 ✅</text>

  <!-- Dark mode contrast -->
  <text x="36" y="400" font-size="10" font-weight="600" fill="#9CA3AF">Sobre fondo dark (#030712):</text>

  <rect x="36" y="406" width="110" height="32" rx="6" fill="#030712" stroke="#1F2937" stroke-width="1"/>
  <text x="91" y="426" font-size="11" fill="#6B7280" text-anchor="middle">gray-500</text>
  <rect x="36" y="440" width="110" height="14" rx="3" fill="#FECACA"/>
  <text x="91" y="451" font-size="9" fill="#DC2626" text-anchor="middle">3.5:1 ❌</text>

  <rect x="154" y="406" width="110" height="32" rx="6" fill="#030712" stroke="#1F2937" stroke-width="1"/>
  <text x="209" y="426" font-size="11" fill="#9CA3AF" text-anchor="middle">gray-400</text>
  <rect x="154" y="440" width="110" height="14" rx="3" fill="#D1FAE5"/>
  <text x="209" y="451" font-size="9" fill="#059669" text-anchor="middle">6.0:1 ✅</text>

  <rect x="272" y="406" width="110" height="32" rx="6" fill="#030712" stroke="#1F2937" stroke-width="1"/>
  <text x="327" y="426" font-size="11" fill="#38BDF8" text-anchor="middle">sky-400</text>
  <rect x="272" y="440" width="110" height="14" rx="3" fill="#D1FAE5"/>
  <text x="327" y="451" font-size="9" fill="#059669" text-anchor="middle">7.8:1 ✅</text>

  <!-- ======================== Q4: motion-safe (bottom-right) ======================== -->
  <rect x="444" y="278" width="396" height="190" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <rect x="444" y="278" width="396" height="34" rx="12" fill="#1A0C2E"/>
  <rect x="444" y="300" width="396" height="12" fill="#1A0C2E"/>
  <text x="642" y="300" font-size="13" font-weight="700" fill="#A78BFA" text-anchor="middle">motion-safe: — Animaciones Accesibles</text>

  <!-- OS preference flow -->
  <text x="460" y="326" font-size="10" fill="#9CA3AF">prefers-reduced-motion activo en el SO:</text>

  <!-- Flow: OS → media query → variant -->
  <rect x="460" y="332" width="120" height="28" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="520" y="346" font-size="10" fill="#9CA3AF" text-anchor="middle" class="code">OS: reduce</text>
  <text x="520" y="358" font-size="8" fill="#6B7280" text-anchor="middle">motion activado</text>

  <line x1="580" y1="342" x2="610" y2="342" stroke="#374151" stroke-width="1.5"/>
  <polygon points="608,338 618,342 608,346" fill="#374151"/>

  <rect x="618" y="332" width="136" height="28" rx="6" fill="#1A0C2E" stroke="#2D1D4E" stroke-width="1"/>
  <text x="686" y="346" font-size="10" fill="#A78BFA" text-anchor="middle" class="code">@media</text>
  <text x="686" y="358" font-size="8" fill="#6B7280" text-anchor="middle">(prefers-reduced-motion: reduce)</text>

  <line x1="754" y1="342" x2="784" y2="342" stroke="#374151" stroke-width="1.5"/>
  <polygon points="782,338 792,342 782,346" fill="#374151"/>

  <rect x="790" y="332" width="40" height="28" rx="6" fill="#4ADE8020" stroke="#4ADE8050" stroke-width="1"/>
  <text x="810" y="350" font-size="10" fill="#4ADE80" text-anchor="middle">off</text>

  <!-- Code comparison -->
  <rect x="460" y="370" width="364" height="38" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="476" y="386" font-size="9" fill="#F87171" class="code">animate-spin           ← siempre corre — ignora prefs</text>
  <text x="476" y="399" font-size="9" fill="#4ADE80" class="code">motion-safe:animate-spin   ← respeta prefs del usuario</text>

  <!-- Tip -->
  <rect x="460" y="416" width="364" height="44" rx="6" fill="#1A0C2E" stroke="#2D1D4E" stroke-width="1"/>
  <text x="476" y="432" font-size="10" font-weight="600" fill="#A78BFA">Regla práctica:</text>
  <text x="476" y="446" font-size="9" fill="#9CA3AF">Animaciones decorativas → usar siempre</text>
  <text x="630" y="446" font-size="9" fill="#38BDF8" class="code"> motion-safe:</text>
  <text x="476" y="458" font-size="9" fill="#9CA3AF">Transiciones de hover/focus (feedback) → OK sin motion-safe:</text>
</svg>
