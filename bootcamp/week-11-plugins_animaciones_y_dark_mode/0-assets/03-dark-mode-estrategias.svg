<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500">
  <defs>
    <style>
      text { font-family: Inter, 'Roboto', system-ui, sans-serif; }
      .code { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" fill="#030712"/>

  <!-- Title -->
  <text x="430" y="36" font-size="18" font-weight="700" fill="#F9FAFB" text-anchor="middle">Dark Mode en TailwindCSS</text>
  <text x="430" y="54" font-size="11" fill="#6B7280" text-anchor="middle">Dos estrategias · Variante dark: · Toggle con localStorage</text>

  <!-- ======================== LEFT: Strategy CLASS ======================== -->
  <rect x="20" y="68" width="392" height="360" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>

  <!-- Header -->
  <rect x="20" y="68" width="392" height="36" rx="12" fill="#0C1A2E"/>
  <rect x="20" y="92" width="392" height="12" fill="#0C1A2E"/>
  <text x="216" y="92" font-size="14" font-weight="700" fill="#38BDF8" text-anchor="middle">Estrategia: class</text>

  <!-- Config -->
  <text x="36" y="122" font-size="10" fill="#9CA3AF" class="code">tailwind.config = { darkMode: 'class' }</text>

  <!-- Flow diagram -->
  <!-- HTML element -->
  <rect x="36" y="134" width="360" height="28" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="56" y="152" font-size="11" fill="#38BDF8" class="code">&lt;html class="dark"&gt;  ← clave</text>

  <!-- Arrow down -->
  <line x1="216" y1="162" x2="216" y2="178" stroke="#374151" stroke-width="1.5"/>
  <polygon points="212,176 216,184 220,176" fill="#374151"/>

  <!-- JS Toggle box -->
  <rect x="36" y="186" width="360" height="68" rx="6" fill="#0C1A2E" stroke="#1E3A5F" stroke-width="1"/>
  <text x="56" y="202" font-size="9" fill="#6B7280" class="code">// Toggle con JavaScript</text>
  <text x="56" y="216" font-size="9" fill="#F9FAFB" class="code">document.documentElement</text>
  <text x="56" y="230" font-size="9" fill="#F9FAFB" class="code">  .classList.toggle('dark')</text>
  <text x="56" y="244" font-size="9" fill="#38BDF8" class="code">localStorage.setItem('theme', 'dark')</text>

  <!-- Arrow down -->
  <line x1="216" y1="254" x2="216" y2="270" stroke="#374151" stroke-width="1.5"/>
  <polygon points="212,268 216,276 220,268" fill="#374151"/>

  <!-- dark: variant example -->
  <rect x="36" y="278" width="360" height="48" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="56" y="296" font-size="9" fill="#A78BFA" class="code">bg-white <tspan fill="#38BDF8">dark:bg-gray-950</tspan></text>
  <text x="56" y="310" font-size="9" fill="#A78BFA" class="code">text-gray-900 <tspan fill="#38BDF8">dark:text-gray-100</tspan></text>
  <text x="56" y="324" font-size="9" fill="#A78BFA" class="code">border-gray-200 <tspan fill="#38BDF8">dark:border-gray-700</tspan></text>

  <!-- localStorage flow -->
  <text x="36" y="350" font-size="10" font-weight="600" fill="#9CA3AF">Persistencia con localStorage:</text>
  <rect x="36" y="356" width="360" height="62" rx="6" fill="#0C1A0C" stroke="#1A3321" stroke-width="1"/>
  <text x="56" y="372" font-size="9" fill="#9CA3AF" class="code">const stored = localStorage.getItem('theme')</text>
  <text x="56" y="386" font-size="9" fill="#9CA3AF" class="code">const prefersDark =</text>
  <text x="56" y="398" font-size="9" fill="#9CA3AF" class="code">  window.matchMedia('(prefers-color-scheme: dark)').matches</text>
  <text x="56" y="412" font-size="9" fill="#4ADE80" class="code">if (stored === 'dark' || (!stored &amp;&amp; prefersDark)) ...</text>

  <!-- ======================== RIGHT: Strategy MEDIA ======================== -->
  <rect x="448" y="68" width="392" height="360" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>

  <!-- Header -->
  <rect x="448" y="68" width="392" height="36" rx="12" fill="#1A1A2E"/>
  <rect x="448" y="92" width="392" height="12" fill="#1A1A2E"/>
  <text x="644" y="92" font-size="14" font-weight="700" fill="#A78BFA" text-anchor="middle">Estrategia: media</text>

  <!-- Config -->
  <text x="464" y="122" font-size="10" fill="#9CA3AF" class="code">tailwind.config = { darkMode: 'media' }</text>

  <!-- Flow diagram -->
  <!-- OS preference box -->
  <rect x="464" y="134" width="360" height="28" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="484" y="152" font-size="10" fill="#A78BFA">🖥  Sistema Operativo → modo oscuro activado</text>

  <!-- Arrow down -->
  <line x1="644" y1="162" x2="644" y2="178" stroke="#374151" stroke-width="1.5"/>
  <polygon points="640,176 644,184 648,176" fill="#374151"/>

  <!-- CSS Media Query box -->
  <rect x="464" y="186" width="360" height="68" rx="6" fill="#1A1A2E" stroke="#2D2D4E" stroke-width="1"/>
  <text x="484" y="202" font-size="9" fill="#6B7280" class="code">/* Tailwind genera automáticamente: */</text>
  <text x="484" y="216" font-size="9" fill="#A78BFA" class="code">@media (prefers-color-scheme: dark) {</text>
  <text x="494" y="230" font-size="9" fill="#F9FAFB" class="code">  .dark\:bg-gray-950 { ... }</text>
  <text x="484" y="244" font-size="9" fill="#A78BFA" class="code">}</text>

  <!-- Arrow down -->
  <line x1="644" y1="254" x2="644" y2="270" stroke="#374151" stroke-width="1.5"/>
  <polygon points="640,268 644,276 648,268" fill="#374151"/>

  <!-- Usage: same dark: variant -->
  <rect x="464" y="278" width="360" height="48" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="484" y="296" font-size="9" fill="#9CA3AF" class="code">Misma sintaxis dark: ← sin diferencia</text>
  <text x="484" y="314" font-size="9" fill="#A78BFA" class="code">bg-white dark:bg-gray-950</text>

  <!-- Pros/Cons -->
  <text x="464" y="350" font-size="10" font-weight="600" fill="#9CA3AF">Características:</text>
  <rect x="464" y="356" width="360" height="62" rx="6" fill="#1A1A2E" stroke="#2D2D4E" stroke-width="1"/>
  <text x="484" y="373" font-size="10" fill="#4ADE80">✅ Sin JavaScript necesario</text>
  <text x="484" y="389" font-size="10" fill="#4ADE80">✅ Automático — sigue la preferencia del SO</text>
  <text x="484" y="405" font-size="10" fill="#F87171">❌ El usuario no puede elegir manualmente</text>
  <text x="484" y="419" font-size="10" fill="#F87171">❌ Sin persistencia de preferencia</text>

  <!-- ======================== BOTTOM RECOMMENDATION ======================== -->
  <rect x="20" y="444" width="820" height="46" rx="10" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="430" y="462" font-size="12" font-weight="700" fill="#F9FAFB" text-anchor="middle">¿Cuándo usar cada estrategia?</text>
  <text x="160" y="480" font-size="11" fill="#38BDF8" text-anchor="middle">class → apps con toggle de usuario</text>
  <text x="430" y="480" font-size="11" fill="#374151" text-anchor="middle">|</text>
  <text x="650" y="480" font-size="11" fill="#A78BFA" text-anchor="middle">media → landings que respetan el SO</text>
</svg>
