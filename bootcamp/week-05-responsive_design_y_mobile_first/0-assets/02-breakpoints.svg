<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>

  <text x="400" y="36" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="middle">Sistema de Breakpoints de Tailwind</text>
  <text x="400" y="56" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Todos son min-width — mobile-first</text>

  <!-- Timeline bar -->
  <rect x="40" y="100" width="720" height="8" rx="4" fill="#1e293b"/>

  <!-- Breakpoint markers -->
  <!-- base: 0px -->
  <circle cx="40" cy="104" r="8" fill="#38bdf8"/>
  <line x1="40" y1="112" x2="40" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="40" y="168" font-family="monospace" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle">base</text>
  <text x="40" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">0px</text>
  <text x="40" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Mobile</text>

  <!-- sm: 640px -->
  <circle cx="180" cy="104" r="8" fill="#38bdf8"/>
  <line x1="180" y1="112" x2="180" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="180" y="168" font-family="monospace" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle">sm:</text>
  <text x="180" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">640px</text>
  <text x="180" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Landscape</text>

  <!-- md: 768px -->
  <circle cx="320" cy="104" r="8" fill="#38bdf8"/>
  <line x1="320" y1="112" x2="320" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="320" y="168" font-family="monospace" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle">md:</text>
  <text x="320" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">768px</text>
  <text x="320" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Tablet</text>

  <!-- lg: 1024px -->
  <circle cx="470" cy="104" r="8" fill="#38bdf8"/>
  <line x1="470" y1="112" x2="470" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="470" y="168" font-family="monospace" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle">lg:</text>
  <text x="470" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">1024px</text>
  <text x="470" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Laptop</text>

  <!-- xl: 1280px -->
  <circle cx="610" cy="104" r="8" fill="#38bdf8"/>
  <line x1="610" y1="112" x2="610" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="610" y="168" font-family="monospace" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle">xl:</text>
  <text x="610" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">1280px</text>
  <text x="610" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Desktop</text>

  <!-- 2xl: 1536px -->
  <circle cx="760" cy="104" r="8" fill="#38bdf8"/>
  <line x1="760" y1="112" x2="760" y2="150" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="760" y="168" font-family="monospace" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle">2xl:</text>
  <text x="760" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">1536px</text>
  <text x="760" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Wide</text>

  <!-- Progress fill on timeline -->
  <rect x="40" y="100" width="720" height="8" rx="4" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>

  <!-- Zones colored under bar -->
  <rect x="40" y="100" width="140" height="8" rx="0" fill="#1e3a5f" opacity="0.8"/>
  <rect x="180" y="100" width="140" height="8" fill="#1e3a5f" opacity="0.7"/>
  <rect x="320" y="100" width="150" height="8" fill="#1e3a5f" opacity="0.6"/>
  <rect x="470" y="100" width="140" height="8" fill="#1e3a5f" opacity="0.5"/>
  <rect x="610" y="100" width="150" height="8" fill="#1e3a5f" opacity="0.4"/>

  <!-- Container example -->
  <rect x="40" y="240" width="720" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="265" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Contenedor recomendado</text>
  <rect x="60" y="278" width="680" height="48" rx="6" fill="#0f172a"/>
  <text x="76" y="298" font-family="monospace" font-size="12" fill="#64748b">&lt;div class="</text>
  <text x="163" y="298" font-family="monospace" font-size="12" fill="#7dd3fc">mx-auto max-w-7xl</text>
  <text x="330" y="298" font-family="monospace" font-size="12" fill="#6ee7b7">px-4 sm:px-6 lg:px-8</text>
  <text x="527" y="298" font-family="monospace" font-size="12" fill="#64748b">"&gt;</text>
  <text x="76" y="316" font-family="monospace" font-size="12" fill="#64748b">  centrado · max 1280px · padding responsivo</text>

  <!-- Note -->
  <text x="400" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Los más usados en práctica: md: (768px) y lg: (1024px)</text>
</svg>
