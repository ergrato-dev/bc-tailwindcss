<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>

  <text x="400" y="36" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="middle">Técnicas Responsive Avanzadas</text>

  <!-- ─── 1: hover only desktop ─── -->
  <rect x="40" y="58" width="220" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="78" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Hover solo en desktop</text>
  <rect x="60" y="86" width="180" height="28" rx="5" fill="#0f172a"/>
  <text x="70" y="105" font-family="monospace" font-size="11" fill="#a78bfa">md:hover:scale-105</text>
  <text x="60" y="132" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Mobile no tiene hover real</text>
  <text x="60" y="148" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">→ evita flash en touch</text>

  <!-- ─── 2: order responsive ─── -->
  <rect x="280" y="58" width="240" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="300" y="78" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Orden Responsive</text>
  <!-- mobile order -->
  <rect x="300" y="86" width="60" height="18" rx="4" fill="#172554"/>
  <text x="330" y="99" font-family="system-ui, sans-serif" font-size="8" fill="#7dd3fc" text-anchor="middle">Texto (1)</text>
  <rect x="300" y="110" width="60" height="18" rx="4" fill="#1e3a5f"/>
  <text x="330" y="123" font-family="system-ui, sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">Img (2)</text>
  <text x="376" y="108" font-family="system-ui, sans-serif" font-size="18" fill="#334155">→</text>
  <!-- desktop order -->
  <rect x="400" y="86" width="50" height="46" rx="4" fill="#1e3a5f"/>
  <text x="425" y="113" font-family="system-ui, sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">Img</text>
  <rect x="458" y="86" width="50" height="46" rx="4" fill="#172554"/>
  <text x="483" y="113" font-family="system-ui, sans-serif" font-size="8" fill="#7dd3fc" text-anchor="middle">Texto</text>
  <text x="300" y="148" font-family="monospace" font-size="10" fill="#6ee7b7">order-2 md:order-1</text>

  <!-- ─── 3: line-clamp responsive ─── -->
  <rect x="540" y="58" width="220" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="560" y="78" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Truncation Responsive</text>
  <rect x="560" y="86" width="180" height="30" rx="4" fill="#0f172a"/>
  <text x="570" y="103" font-family="monospace" font-size="10" fill="#7dd3fc">line-clamp-2</text>
  <text x="650" y="103" font-family="monospace" font-size="10" fill="#6ee7b7">md:line-clamp-4</text>
  <!-- visual clamp -->
  <rect x="560" y="122" width="180" height="9" rx="2" fill="#334155"/>
  <rect x="560" y="135" width="140" height="9" rx="2" fill="#334155"/>
  <text x="705" y="144" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">...</text>
  <text x="652" y="160" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">→ lg:line-clamp-none</text>

  <!-- ─── 4: text-align responsive ─── -->
  <rect x="40" y="168" width="220" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="188" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Alineación Responsive</text>
  <rect x="60" y="196" width="180" height="28" rx="5" fill="#0f172a"/>
  <text x="70" y="215" font-family="monospace" font-size="11" fill="#7dd3fc">text-center</text>
  <text x="152" y="215" font-family="monospace" font-size="11" fill="#6ee7b7">md:text-left</text>
  <text x="60" y="240" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Botones: justify-center</text>
  <text x="60" y="256" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">→ md:justify-start</text>

  <!-- ─── 5: sticky navbar ─── -->
  <rect x="280" y="168" width="240" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="300" y="188" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Navbar Glassmorphism</text>
  <rect x="300" y="196" width="200" height="28" rx="5" fill="#0f172a"/>
  <text x="308" y="211" font-family="monospace" font-size="10" fill="#7dd3fc">sticky top-0 z-50</text>
  <text x="308" y="225" font-family="monospace" font-size="10" fill="#fcd34d">bg-white/80 backdrop-blur-md</text>
  <text x="300" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Navbar "flota" sobre el contenido</text>

  <!-- ─── 6: sidebar responsive ─── -->
  <rect x="540" y="168" width="220" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="560" y="188" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Sidebar → Tabs en Mobile</text>
  <!-- mobile tabs -->
  <rect x="560" y="196" width="180" height="20" rx="4" fill="#0f172a"/>
  <rect x="562" y="198" width="40" height="16" rx="3" fill="#0284c7"/>
  <rect x="608" y="198" width="40" height="16" rx="3" fill="#334155"/>
  <rect x="654" y="198" width="40" height="16" rx="3" fill="#334155"/>
  <text x="560" y="233" font-family="monospace" font-size="10" fill="#64748b">flex flex-row overflow-x-auto</text>
  <text x="560" y="248" font-family="monospace" font-size="10" fill="#6ee7b7">md:flex-col md:w-56</text>

  <!-- ─── Wide section: breakpoint + state combos ─── -->
  <rect x="40" y="278" width="720" height="96" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="300" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Combinaciones Breakpoint + Estado</text>
  <rect x="60" y="310" width="680" height="52" rx="6" fill="#0f172a"/>
  <!-- row 1 -->
  <text x="76" y="328" font-family="monospace" font-size="11" fill="#64748b">hover solo desktop:</text>
  <text x="200" y="328" font-family="monospace" font-size="11" fill="#a78bfa">md:hover:scale-105 md:hover:shadow-xl</text>
  <text x="460" y="328" font-family="monospace" font-size="11" fill="#6ee7b7">md:transition-transform</text>
  <!-- row 2 -->
  <text x="76" y="348" font-family="monospace" font-size="11" fill="#64748b">focus ring responsive:</text>
  <text x="210" y="348" font-family="monospace" font-size="11" fill="#fcd34d">focus-visible:ring-1 md:focus-visible:ring-2</text>
  <text x="460" y="348" font-family="monospace" font-size="11" fill="#7dd3fc">focus-visible:ring-sky-500</text>
  <text x="400" y="372" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Testear siempre: 375px · 768px · 1024px · 1280px</text>
</svg>
