<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="middle">Filosofía Mobile-First</text>
  <text x="400" y="60" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Las clases sin prefijo aplican a mobile · los breakpoints escalan hacia arriba</text>

  <!-- Devices: mobile → tablet → desktop -->
  <!-- Mobile phone -->
  <rect x="60" y="90" width="100" height="180" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <rect x="72" y="108" width="76" height="124" rx="4" fill="#0f172a"/>
  <!-- screen content -->
  <rect x="80" y="116" width="60" height="10" rx="3" fill="#334155"/>
  <rect x="80" y="132" width="60" height="10" rx="3" fill="#334155"/>
  <rect x="80" y="148" width="40" height="10" rx="3" fill="#334155"/>
  <rect x="80" y="168" width="60" height="22" rx="6" fill="#38bdf8"/>
  <circle cx="110" cy="220" r="4" fill="#38bdf8"/>
  <text x="110" y="295" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" text-anchor="middle">Mobile</text>
  <text x="110" y="313" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">320–639px</text>
  <text x="110" y="332" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(base — sin prefijo)</text>

  <!-- Arrow 1 -->
  <line x1="172" y1="180" x2="218" y2="180" stroke="#334155" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="218,175 228,180 218,185" fill="#334155"/>

  <!-- Tablet -->
  <rect x="230" y="100" width="160" height="180" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <rect x="242" y="112" width="136" height="140" rx="4" fill="#0f172a"/>
  <!-- 2-col content -->
  <rect x="250" y="120" width="56" height="48" rx="4" fill="#1e3a5f"/>
  <rect x="314" y="120" width="56" height="48" rx="4" fill="#1e3a5f"/>
  <rect x="250" y="176" width="120" height="10" rx="3" fill="#334155"/>
  <rect x="250" y="192" width="90" height="8" rx="3" fill="#334155"/>
  <rect x="250" y="208" width="120" height="20" rx="5" fill="#0284c7"/>
  <circle cx="310" cy="252" r="4" fill="#38bdf8"/>
  <text x="310" y="295" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" text-anchor="middle">Tablet</text>
  <text x="310" y="313" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">768px+</text>
  <text x="310" y="332" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(md: breakpoint)</text>

  <!-- Arrow 2 -->
  <line x1="398" y1="180" x2="444" y2="180" stroke="#334155" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="444,175 454,180 444,185" fill="#334155"/>

  <!-- Desktop -->
  <rect x="456" y="90" width="280" height="190" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <rect x="466" y="100" width="260" height="162" rx="4" fill="#0f172a"/>
  <!-- 3-col content -->
  <rect x="474" y="108" width="66" height="60" rx="4" fill="#1e3a5f"/>
  <rect x="548" y="108" width="66" height="60" rx="4" fill="#1e3a5f"/>
  <rect x="622" y="108" width="66" height="60" rx="4" fill="#1e3a5f"/>
  <rect x="474" y="176" width="214" height="10" rx="3" fill="#334155"/>
  <rect x="474" y="192" width="160" height="8" rx="3" fill="#334155"/>
  <rect x="474" y="208" width="100" height="20" rx="5" fill="#0284c7"/>
  <!-- monitor stand -->
  <rect x="585" y="282" width="6" height="30" fill="#475569"/>
  <rect x="565" y="312" width="46" height="6" rx="3" fill="#475569"/>
  <text x="596" y="360" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" text-anchor="middle">Desktop</text>
  <text x="596" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">1024px+</text>
  <text x="596" y="396" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(lg: breakpoint)</text>

  <!-- Code snippet bottom -->
  <rect x="60" y="370" width="500" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="76" y="385" font-family="monospace" font-size="11" fill="#64748b">class="</text>
  <text x="119" y="385" font-family="monospace" font-size="11" fill="#7dd3fc">text-sm</text>
  <text x="169" y="385" font-family="monospace" font-size="11" fill="#64748b">    ←  mobile base</text>
  <text x="76" y="399" font-family="monospace" font-size="11" fill="#a78bfa">md:text-base</text>
  <text x="165" y="399" font-family="monospace" font-size="11" fill="#64748b">  ← tablet+</text>
  <text x="250" y="399" font-family="monospace" font-size="11" fill="#6ee7b7">lg:text-lg</text>
  <text x="318" y="399" font-family="monospace" font-size="11" fill="#64748b">"</text>
</svg>
