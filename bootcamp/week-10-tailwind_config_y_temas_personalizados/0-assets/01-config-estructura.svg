<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%">
  <defs>
    <style>
      text { font-family: Inter, system-ui, sans-serif; }
      .label-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#030712" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#F9FAFB" font-size="16" font-weight="700">
    Estructura de tailwind.config.js
  </text>

  <!-- === FILE ICON === -->
  <g transform="translate(36, 56)">
    <rect width="96" height="116" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
    <!-- Folded corner -->
    <path d="M68 0 L96 28 L68 28 Z" fill="#374151"/>
    <path d="M68 0 L96 28" fill="none" stroke="#111827" stroke-width="1"/>
    <!-- File lines -->
    <rect x="14" y="44" width="68" height="4" rx="2" fill="#374151"/>
    <rect x="14" y="56" width="52" height="4" rx="2" fill="#374151"/>
    <rect x="14" y="68" width="60" height="4" rx="2" fill="#374151"/>
    <rect x="14" y="80" width="40" height="4" rx="2" fill="#374151"/>
    <!-- Filename -->
    <text x="48" y="108" text-anchor="middle" fill="#9CA3AF" font-size="9" class="label-mono">
      tailwind.config.js
    </text>
  </g>

  <!-- Arrow from file to sections -->
  <line x1="132" y1="114" x2="170" y2="114" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="170,110 178,114 170,118" fill="#374151"/>

  <!-- === MAIN SECTIONS === -->

  <!-- content[] -->
  <g transform="translate(180, 56)">
    <rect width="150" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
    <text x="12" y="19" fill="#38BDF8" font-size="10" class="label-mono" font-weight="600">content</text>
    <text x="12" y="19" dx="48" fill="#9CA3AF" font-size="10" class="label-mono">[]</text>
    <text x="12" y="36" fill="#6B7280" font-size="9">Rutas de archivos HTML/JS</text>
    <text x="12" y="49" fill="#6B7280" font-size="9">para tree-shaking CSS</text>
  </g>

  <!-- theme{ extend{} } -->
  <g transform="translate(180, 122)">
    <rect width="150" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
    <text x="12" y="19" fill="#38BDF8" font-size="10" class="label-mono" font-weight="600">theme</text>
    <text x="12" y="19" dx="34" fill="#9CA3AF" font-size="10" class="label-mono"> &#123; extend &#125;</text>
    <text x="12" y="36" fill="#6B7280" font-size="9">Colores, fuentes, spacing,</text>
    <text x="12" y="49" fill="#6B7280" font-size="9">breakpoints custom</text>
  </g>

  <!-- plugins[] -->
  <g transform="translate(180, 188)">
    <rect width="150" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
    <text x="12" y="19" fill="#38BDF8" font-size="10" class="label-mono" font-weight="600">plugins</text>
    <text x="12" y="19" dx="48" fill="#9CA3AF" font-size="10" class="label-mono">[]</text>
    <text x="12" y="36" fill="#6B7280" font-size="9">Typography, Forms,</text>
    <text x="12" y="49" fill="#6B7280" font-size="9">Aspect Ratio, etc.</text>
  </g>

  <!-- darkMode -->
  <g transform="translate(180, 254)">
    <rect width="150" height="52" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1.5"/>
    <text x="12" y="19" fill="#38BDF8" font-size="10" class="label-mono" font-weight="600">darkMode</text>
    <text x="12" y="36" fill="#6B7280" font-size="9">'class' o 'media'</text>
    <text x="12" y="49" fill="#6B7280" font-size="9">Estrategia de dark mode</text>
  </g>

  <!-- Arrow content → files -->
  <line x1="330" y1="82" x2="400" y2="82" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="400,78 408,82 400,86" fill="#374151"/>

  <!-- Files target label -->
  <g transform="translate(410, 60)">
    <rect width="120" height="44" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
    <text x="10" y="17" fill="#9CA3AF" font-size="9">./src/**/*.&#123;html,js&#125;</text>
    <text x="10" y="31" fill="#9CA3AF" font-size="9">./components/**/*.tsx</text>
    <text x="0" y="54" fill="#6B7280" font-size="8">Archivos escaneados</text>
  </g>

  <!-- Arrow theme → extend boxes -->
  <line x1="330" y1="148" x2="368" y2="148" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="368,144 376,148 368,152" fill="#374151"/>

  <!-- === theme.extend detail === -->
  <g transform="translate(378, 118)">
    <rect width="132" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
    <text x="10" y="18" fill="#6B7280" font-size="9" class="label-mono">theme.extend: &#123;</text>

    <text x="18" y="34" fill="#38BDF8" font-size="8.5" class="label-mono">colors</text>
    <text x="18" y="34" dx="38" fill="#6B7280" font-size="8.5" class="label-mono">: &#123;...&#125;</text>

    <text x="18" y="50" fill="#38BDF8" font-size="8.5" class="label-mono">fontFamily</text>
    <text x="18" y="50" dx="60" fill="#6B7280" font-size="8.5" class="label-mono">: &#123;&#125;</text>

    <text x="18" y="66" fill="#38BDF8" font-size="8.5" class="label-mono">fontSize</text>
    <text x="18" y="66" dx="48" fill="#6B7280" font-size="8.5" class="label-mono">: &#123;&#125;</text>

    <text x="18" y="82" fill="#38BDF8" font-size="8.5" class="label-mono">spacing</text>
    <text x="18" y="82" dx="44" fill="#6B7280" font-size="8.5" class="label-mono">: &#123;&#125;</text>

    <text x="18" y="98" fill="#38BDF8" font-size="8.5" class="label-mono">screens</text>
    <text x="18" y="98" dx="44" fill="#6B7280" font-size="8.5" class="label-mono">: &#123;&#125;</text>

    <text x="10" y="116" fill="#6B7280" font-size="9" class="label-mono">&#125;</text>
  </g>

  <!-- === extend vs replace comparison === -->
  <g transform="translate(36, 330)">
    <text x="0" y="0" fill="#9CA3AF" font-size="12" font-weight="600">extend vs. reemplazar</text>

    <!-- extend box -->
    <g transform="translate(0, 14)">
      <rect width="350" height="72" rx="8" fill="#052E16" stroke="#16A34A" stroke-width="1.5"/>
      <!-- checkmark badge -->
      <rect x="10" y="10" width="22" height="22" rx="4" fill="#16A34A"/>
      <text x="21" y="26" text-anchor="middle" fill="white" font-size="12" font-weight="700">✓</text>
      <text x="42" y="24" fill="#86EFAC" font-size="10" font-weight="600">theme.extend.colors &#123; brand: &#123;...&#125; &#125;</text>
      <text x="42" y="40" fill="#4ADE80" font-size="9">✅ Añade brand-* SIN eliminar gray-*, blue-*, red-*</text>
      <text x="42" y="55" fill="#4ADE80" font-size="9">   Todos los colores por defecto de Tailwind siguen disponibles</text>
    </g>

    <!-- replace box -->
    <g transform="translate(0, 98)">
      <rect width="350" height="72" rx="8" fill="#450A0A" stroke="#DC2626" stroke-width="1.5"/>
      <!-- x badge -->
      <rect x="10" y="10" width="22" height="22" rx="4" fill="#DC2626"/>
      <text x="21" y="26" text-anchor="middle" fill="white" font-size="12" font-weight="700">✕</text>
      <text x="42" y="24" fill="#FCA5A5" font-size="10" font-weight="600">theme.colors &#123; brand: &#123;...&#125; &#125;</text>
      <text x="42" y="40" fill="#F87171" font-size="9">⚠️ Reemplaza TODOS los colores de Tailwind</text>
      <text x="42" y="55" fill="#F87171" font-size="9">   gray-*, blue-*, red-*, etc. ya no existirán</text>
    </g>
  </g>

  <!-- Right column: note about v4 -->
  <g transform="translate(420, 330)">
    <rect width="344" height="100" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
    <text x="12" y="22" fill="#FBBF24" font-size="11" font-weight="600">Tailwind v4 — CSS-first</text>
    <text x="12" y="42" fill="#9CA3AF" font-size="9.5">En v4, la config se hace en CSS con @theme:</text>
    <text x="12" y="64" fill="#38BDF8" font-size="9" class="label-mono">@theme &#123;</text>
    <text x="22" y="78" fill="#38BDF8" font-size="9" class="label-mono">--color-brand-500: #d946ef;</text>
    <text x="12" y="92" fill="#38BDF8" font-size="9" class="label-mono">&#125;</text>
  </g>

</svg>
