<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">

  <!-- Background -->
  <rect width="800" height="460" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19" font-weight="700" fill="#f1f5f9">Unidades de Medida en CSS</text>
  <text x="400" y="53" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" fill="#64748b">Absolutas vs. Relativas — ¿Cuándo usar cada una?</text>

  <!-- ==========================================
       5 UNIT COLUMNS (px, rem, em, %, vh/vw)
       x positions: 56, 196, 336, 476, 616
       width: 120px each, gap 20px
       ========================================== -->

  <!-- === PX === -->
  <rect x="40" y="68" width="130" height="300" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="40" y="68" width="130" height="44" rx="8" fill="#334155"/>
  <rect x="40" y="90" width="130" height="22" fill="#334155"/>
  <text x="105" y="88" text-anchor="middle"
    font-family="monospace,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">px</text>
  <text x="105" y="103" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Absoluta</text>
  <!-- Body -->
  <text x="56" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">1px = 1 píxel CSS</text>
  <text x="56" y="146" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">No escala</text>
  <!-- Use cases -->
  <text x="56" y="174" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ border: 1px</text>
  <text x="56" y="189" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ sombras</text>
  <text x="56" y="204" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ offsets</text>
  <text x="56" y="226" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">✗ font-size</text>
  <text x="56" y="241" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">✗ spacing acc.</text>
  <!-- Example -->
  <rect x="50" y="300" width="110" height="50" rx="4" fill="#0f172a"/>
  <text x="56" y="315" font-family="monospace,sans-serif" font-size="9" fill="#64748b">border: 2px;</text>
  <text x="56" y="329" font-family="monospace,sans-serif" font-size="9" fill="#64748b">font-size: 16px;</text>
  <text x="56" y="344" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">⚠ no accesible</text>

  <!-- === REM === (highlighted — recommended) -->
  <rect x="182" y="68" width="130" height="300" rx="8" fill="#082f49" stroke="#0284c7" stroke-width="2"/>
  <!-- Header -->
  <rect x="182" y="68" width="130" height="44" rx="8" fill="#0284c7"/>
  <rect x="182" y="90" width="130" height="22" fill="#0284c7"/>
  <text x="247" y="88" text-anchor="middle"
    font-family="monospace,sans-serif" font-size="16" font-weight="700" fill="white">rem</text>
  <text x="247" y="103" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#bae6fd">Relativa al root</text>
  <!-- Recommended badge -->
  <rect x="190" y="116" width="114" height="15" rx="7" fill="#0c4a6e"/>
  <text x="247" y="127" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#38bdf8">★  Recomendada</text>
  <!-- Body -->
  <text x="198" y="146" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#7dd3fc">1rem = 16px (html)</text>
  <text x="198" y="161" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#7dd3fc">Escala accesible</text>
  <!-- Use cases -->
  <text x="198" y="186" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ font-size</text>
  <text x="198" y="201" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ padding / margin</text>
  <text x="198" y="216" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ gap / width</text>
  <text x="198" y="231" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ Tailwind default</text>
  <!-- Example -->
  <rect x="192" y="300" width="110" height="50" rx="4" fill="#0f172a"/>
  <text x="198" y="315" font-family="monospace,sans-serif" font-size="9" fill="#7dd3fc">h1: 2rem → 32px</text>
  <text x="198" y="329" font-family="monospace,sans-serif" font-size="9" fill="#7dd3fc">p: 1rem → 16px</text>
  <text x="198" y="344" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ escala con user</text>

  <!-- === EM === -->
  <rect x="324" y="68" width="130" height="300" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="324" y="68" width="130" height="44" rx="8" fill="#334155"/>
  <rect x="324" y="90" width="130" height="22" fill="#334155"/>
  <text x="389" y="88" text-anchor="middle"
    font-family="monospace,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">em</text>
  <text x="389" y="103" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Relativa al padre</text>
  <!-- Body -->
  <text x="340" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">1em = font-size</text>
  <text x="340" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">del elemento padre</text>
  <text x="340" y="162" font-family="monospace,sans-serif" font-size="9" fill="#f59e0b">⚠ efecto compuesto</text>
  <!-- Use cases -->
  <text x="340" y="186" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ padding interno</text>
  <text x="340" y="201" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ media queries</text>
  <text x="340" y="226" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">✗ tipografía global</text>
  <text x="340" y="241" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">✗ listas anidadas</text>
  <!-- Example -->
  <rect x="334" y="300" width="110" height="50" rx="4" fill="#0f172a"/>
  <text x="340" y="315" font-family="monospace,sans-serif" font-size="9" fill="#94a3b8">.card { 18px }</text>
  <text x="340" y="329" font-family="monospace,sans-serif" font-size="9" fill="#94a3b8">h3 { 1.5em→27px }</text>
  <text x="340" y="344" font-family="monospace,sans-serif" font-size="9" fill="#f59e0b">⚠ relativo al padre</text>

  <!-- === % === -->
  <rect x="466" y="68" width="130" height="300" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="466" y="68" width="130" height="44" rx="8" fill="#334155"/>
  <rect x="466" y="90" width="130" height="22" fill="#334155"/>
  <text x="531" y="88" text-anchor="middle"
    font-family="monospace,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">%</text>
  <text x="531" y="103" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Relativa al padre</text>
  <!-- Body -->
  <text x="482" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Relativa al</text>
  <text x="482" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">contenedor padre</text>
  <!-- Use cases -->
  <text x="482" y="172" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ width layouts</text>
  <text x="482" y="187" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ img responsive</text>
  <text x="482" y="202" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ max-width: 90%</text>
  <text x="482" y="227" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">✗ font-size global</text>
  <!-- Example -->
  <rect x="476" y="300" width="110" height="50" rx="4" fill="#0f172a"/>
  <text x="482" y="315" font-family="monospace,sans-serif" font-size="9" fill="#94a3b8">sidebar: 25%</text>
  <text x="482" y="329" font-family="monospace,sans-serif" font-size="9" fill="#94a3b8">main: 75%</text>
  <text x="482" y="344" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ fluido</text>

  <!-- === VH/VW === -->
  <rect x="608" y="68" width="152" height="300" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="608" y="68" width="152" height="44" rx="8" fill="#334155"/>
  <rect x="608" y="90" width="152" height="22" fill="#334155"/>
  <text x="684" y="88" text-anchor="middle"
    font-family="monospace,sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">vh / vw</text>
  <text x="684" y="103" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Relativa al viewport</text>
  <!-- Body -->
  <text x="624" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">1vh = 1% alto ventana</text>
  <text x="624" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">1vw = 1% ancho</text>
  <text x="624" y="162" font-family="monospace,sans-serif" font-size="9" fill="#a78bfa">svh/dvh (modernas)</text>
  <!-- Use cases -->
  <text x="624" y="186" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ hero full-screen</text>
  <text x="624" y="201" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ modals h=100vh</text>
  <text x="624" y="216" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ sidebar fija</text>
  <text x="624" y="241" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">✗ párrafos de texto</text>
  <!-- Example -->
  <rect x="618" y="300" width="132" height="50" rx="4" fill="#0f172a"/>
  <text x="624" y="315" font-family="monospace,sans-serif" font-size="9" fill="#94a3b8">hero: min-h: 100vh</text>
  <text x="624" y="329" font-family="monospace,sans-serif" font-size="9" fill="#94a3b8">modal: h: 90vh</text>
  <text x="624" y="344" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ relativo a ventana</text>

  <!-- ==========================================
       BOTTOM: Tailwind rem scale
       ========================================== -->
  <rect x="40" y="386" width="720" height="58" rx="6" fill="#082f49"/>
  <text x="400" y="400" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#7dd3fc">Escala de espaciado en TailwindCSS (base rem)</text>
  <text x="400" y="416" text-anchor="middle"
    font-family="monospace,sans-serif"
    font-size="10" fill="#64748b">p-1 = 0.25rem = 4px  ·  p-2 = 0.5rem = 8px  ·  p-4 = 1rem = 16px  ·  p-6 = 1.5rem = 24px  ·  p-8 = 2rem = 32px</text>
  <text x="400" y="434" text-anchor="middle"
    font-family="monospace,sans-serif"
    font-size="10" fill="#38bdf8">Cada unidad Tailwind = 4px = 0.25rem — sistema predecible y consistente</text>

</svg>
