<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">

  <!-- Background -->
  <rect width="800" height="460" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="33" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19" font-weight="700" fill="#f1f5f9">TailwindCSS: Filosofía Utility-First</text>
  <text x="400" y="52" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="12" fill="#64748b">Del CSS tradicional al enfoque moderno de utilidades co-ubicadas</text>

  <!-- ==========================================
       LEFT PANEL — CSS Tradicional
       ========================================== -->
  <rect x="30" y="66" width="330" height="296" rx="8"
    fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Header badge -->
  <rect x="30" y="66" width="330" height="36" rx="8" fill="#7f1d1d"/>
  <rect x="30" y="88" width="330" height="14" fill="#7f1d1d"/>
  <text x="195" y="88" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#fca5a5">CSS Tradicional</text>

  <!-- File tabs mockup -->
  <rect x="40" y="110" width="80" height="16" rx="3" fill="#334155"/>
  <text x="80" y="122" text-anchor="middle"
    font-family="monospace,sans-serif" font-size="9" fill="#94a3b8">index.html</text>
  <rect x="130" y="110" width="80" height="16" rx="3" fill="#1e3a5f"/>
  <text x="170" y="122" text-anchor="middle"
    font-family="monospace,sans-serif" font-size="9" fill="#38bdf8">styles.css  ● unsaved</text>

  <!-- CSS file content (the tangled CSS) -->
  <rect x="40" y="132" width="308" height="220" rx="3" fill="#0f172a"/>
  <text x="52" y="149" font-family="monospace,sans-serif" font-size="10" fill="#64748b">/* styles.css — 1,200+ líneas */</text>
  <text x="52" y="165" font-family="monospace,sans-serif" font-size="10" fill="#ef4444">.card { background: white; }</text>
  <text x="52" y="180" font-family="monospace,sans-serif" font-size="10" fill="#ef4444">.card-new { background: white; }</text>
  <text x="52" y="195" font-family="monospace,sans-serif" font-size="10" fill="#ef4444">.card-v2-final { ... }</text>
  <text x="52" y="210" font-family="monospace,sans-serif" font-size="10" fill="#94a3b8">/* ¿Puedo borrar esto? */</text>
  <text x="52" y="225" font-family="monospace,sans-serif" font-size="10" fill="#334155">.old-card { display: flex }</text>
  <text x="52" y="240" font-family="monospace,sans-serif" font-size="10" fill="#334155">.wrapper-inner { ... }</text>
  <text x="52" y="255" font-family="monospace,sans-serif" font-size="10" fill="#ef4444">.card__title--large { ... }</text>
  <text x="52" y="270" font-family="monospace,sans-serif" font-size="10" fill="#94a3b8">/* TODO: revisar esto */</text>
  <text x="52" y="285" font-family="monospace,sans-serif" font-size="10" fill="#334155">.container-wrapper { ... }</text>
  <text x="52" y="300" font-family="monospace,sans-serif" font-size="10" fill="#ef4444">/* REALMENTE FINAL v3 */</text>
  <text x="52" y="315" font-family="monospace,sans-serif" font-size="10" fill="#475569">/* ... 800 líneas más ... */</text>
  <text x="52" y="334" font-family="monospace,sans-serif" font-size="9" fill="#ef4444">⚠ CSS que nunca se puede borrar</text>

  <!-- ==========================================
       ARROW in the middle
       ========================================== -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
      refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
  </defs>
  <line x1="376" y1="210" x2="416" y2="210"
    stroke="#38bdf8" stroke-width="2.5"
    marker-end="url(#arrowhead)"/>
  <text x="396" y="202" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="10" fill="#38bdf8">utility</text>
  <text x="396" y="226" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="10" fill="#38bdf8">first</text>

  <!-- ==========================================
       RIGHT PANEL — TailwindCSS
       ========================================== -->
  <rect x="430" y="66" width="340" height="296" rx="8"
    fill="#082f49" stroke="#0284c7" stroke-width="2"/>
  <!-- Header badge -->
  <rect x="430" y="66" width="340" height="36" rx="8" fill="#0284c7"/>
  <rect x="430" y="88" width="340" height="14" fill="#0284c7"/>
  <text x="600" y="88" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="white">TailwindCSS Utility-First</text>

  <!-- HTML file content -->
  <rect x="440" y="132" width="318" height="220" rx="3" fill="#0f172a"/>
  <text x="452" y="149" font-family="monospace,sans-serif" font-size="10" fill="#64748b">&lt;!-- index.html — estilos co-ubicados --&gt;</text>
  <text x="452" y="171" font-family="monospace,sans-serif" font-size="10" fill="#7dd3fc">&lt;div class="</text>
  <text x="516" y="171" font-family="monospace,sans-serif" font-size="10" fill="#38bdf8">bg-white</text>
  <text x="452" y="187" font-family="monospace,sans-serif" font-size="10" fill="#38bdf8">      rounded-xl shadow-md</text>
  <text x="452" y="203" font-family="monospace,sans-serif" font-size="10" fill="#38bdf8">      p-6 hover:shadow-xl</text>
  <text x="452" y="219" font-family="monospace,sans-serif" font-size="10" fill="#38bdf8">      transition-shadow</text>
  <text x="452" y="235" font-family="monospace,sans-serif" font-size="10" fill="#7dd3fc">  "&gt;</text>
  <text x="452" y="253" font-family="monospace,sans-serif" font-size="10" fill="#7dd3fc">  &lt;h2 class="</text>
  <text x="516" y="253" font-family="monospace,sans-serif" font-size="10" fill="#38bdf8">text-xl</text>
  <text x="452" y="269" font-family="monospace,sans-serif" font-size="10" fill="#38bdf8">        font-bold text-gray-900</text>
  <text x="452" y="285" font-family="monospace,sans-serif" font-size="10" fill="#7dd3fc">  "&gt;Título&lt;/h2&gt;</text>
  <text x="452" y="303" font-family="monospace,sans-serif" font-size="10" fill="#7dd3fc">&lt;/div&gt;</text>
  <text x="452" y="330" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ Sin archivo CSS separado que mantener</text>
  <text x="452" y="344" font-family="monospace,sans-serif" font-size="9" fill="#22c55e">✓ Cada clase hace exactamente una cosa</text>

  <!-- ==========================================
       BOTTOM ROW: 3 advantages
       ========================================== -->
  <rect x="30" y="380" width="740" height="62" rx="6" fill="#1e293b"/>

  <!-- Benefit 1 -->
  <rect x="44" y="390" width="218" height="42" rx="4" fill="#082f49"/>
  <text x="68" y="407" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#38bdf8">Sin CSS huérfano</text>
  <text x="68" y="422" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Solo se genera el CSS que se usa</text>

  <!-- Benefit 2 -->
  <rect x="276" y="390" width="238" height="42" rx="4" fill="#082f49"/>
  <text x="300" y="407" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#38bdf8">Consistencia de diseño</text>
  <text x="300" y="422" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Sistema de colores, spacing y tipos</text>

  <!-- Benefit 3 -->
  <rect x="528" y="390" width="228" height="42" rx="4" fill="#082f49"/>
  <text x="552" y="407" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#38bdf8">Legibilidad inmediata</text>
  <text x="552" y="422" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">El estilo vive junto al markup</text>

</svg>
