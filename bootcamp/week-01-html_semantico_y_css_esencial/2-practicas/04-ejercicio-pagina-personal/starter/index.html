<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Página personal de [Tu Nombre] — Frontend Developer" />
  <title>[Tu Nombre] — Frontend Developer</title>
  <style>
    /* =====================================================
         RESET Y BASE — box-sizing y tipografía global
         ===================================================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Variables de diseño — personaliza aquí tus colores */
      --color-primary: #0ea5e9;
      --color-primary-dark: #0369a1;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-bg: #f8fafc;
      --color-white: #ffffff;
      --color-border: #e2e8f0;
      --color-card-bg: #ffffff;

      /* Tipografía — usando rem */
      --font-base: 1rem;
      /* 16px */
      --font-sm: 0.875rem;
      /* 14px */
      --font-lg: 1.125rem;
      /* 18px */
      --font-xl: 1.25rem;
      /* 20px */
      --font-2xl: 1.5rem;
      /* 24px */
      --font-3xl: 1.875rem;
      /* 30px */
      --font-4xl: 2.25rem;
      /* 36px */

      /* Espaciado — usando rem */
      --space-2: 0.5rem;
      /* 8px */
      --space-3: 0.75rem;
      /* 12px */
      --space-4: 1rem;
      /* 16px */
      --space-6: 1.5rem;
      /* 24px */
      --space-8: 2rem;
      /* 32px */
      --space-12: 3rem;
      /* 48px */
      --space-16: 4rem;
      /* 64px */
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: var(--font-base);
      line-height: 1.6;
      color: var(--color-text);
      background: var(--color-bg);
    }

    /* Container utilitario */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* =====================================================
         ESTILOS BASE PARA LOS COMPONENTES
         ===================================================== */
    /* Header */
    .site-header {
      background: var(--color-white);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-4) 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .profile {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--color-primary);
    }

    .profile-name {
      font-size: var(--font-xl);
      font-weight: 700;
    }

    .profile-title {
      font-size: var(--font-sm);
      color: var(--color-text-muted);
    }

    /* Nav */
    .site-nav ul {
      display: flex;
      gap: var(--space-6);
      list-style: none;
    }

    .site-nav a {
      font-size: var(--font-sm);
      color: var(--color-text-muted);
      text-decoration: none;
      font-weight: 500;
    }

    .site-nav a:hover,
    .site-nav a[aria-current="page"] {
      color: var(--color-primary);
    }

    /* Main */
    .site-main {
      padding: var(--space-16) 0;
    }

    /* Sections */
    .section {
      margin-bottom: var(--space-16);
    }

    .section-title {
      font-size: var(--font-2xl);
      font-weight: 700;
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-3);
      border-bottom: 2px solid var(--color-primary);
      display: inline-block;
    }

    /* About */
    .about-text {
      font-size: var(--font-lg);
      color: var(--color-text-muted);
      max-width: 65ch;
      line-height: 1.8;
    }

    /* Skills */
    .skills-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .skill-item {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 8px;
    }

    .skill-name {
      font-weight: 600;
      min-width: 120px;
    }

    .skill-desc {
      font-size: var(--font-sm);
      color: var(--color-text-muted);
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-6);
    }

    .project-card {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .project-card h3 {
      font-size: var(--font-lg);
    }

    .project-card h3 a {
      color: var(--color-text);
      text-decoration: none;
    }

    .project-card h3 a:hover {
      color: var(--color-primary);
    }

    .project-card p {
      font-size: var(--font-sm);
      color: var(--color-text-muted);
      flex: 1;
    }

    .project-card footer {
      margin-top: auto;
    }

    .tech-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      list-style: none;
    }

    .tech-list li {
      font-size: 0.75rem;
      background: #e0f2fe;
      color: var(--color-primary-dark);
      padding: 2px 10px;
      border-radius: 9999px;
      font-weight: 500;
    }

    /* Footer */
    .site-footer {
      background: #1e293b;
      color: #94a3b8;
      padding: var(--space-12) 0;
    }

    .footer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      text-align: center;
    }

    .contact-links {
      display: flex;
      gap: var(--space-6);
      flex-wrap: wrap;
      justify-content: center;
    }

    .contact-links a {
      color: #7dd3fc;
      text-decoration: none;
      font-size: var(--font-sm);
    }

    .contact-links a:hover {
      color: white;
    }
  </style>
</head>
