  <style>
    /* Reset básico para que foquemos en semántica, no en estilos */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      color: #1f2937;
    }

    a {
      color: #0ea5e9;
    }

    ul {
      list-style: none;
    }

    /* Layout helpers */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 0;
    }

    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav ul {
      display: flex;
      gap: 24px;
    }

    main .container {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 32px;
      padding-block: 40px;
    }

    section h2 {
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: #111827;
    }

    article {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
    }

    article h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    article p {
      color: #6b7280;
      margin-bottom: 12px;
    }

    aside {
      padding: 24px;
      background: #f9fafb;
      border-radius: 8px;
      height: fit-content;
    }

    aside h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    aside ul li {
      padding: 6px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    footer {
      background: #1f2937;
      color: #d1d5db;
      padding: 40px 0 24px;
      margin-top: 48px;
    }

    footer .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      text-align: center;
    }

    footer a {
      color: #9ca3af;
    }

    footer nav ul {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .logo {
      font-weight: 700;
      font-size: 1.25rem;
      color: #0ea5e9;
      text-decoration: none;
    }
  </style>
</head>
