<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio — Cascade y Especificidad</title>
  <style>
    /* === BASE — No modificar === */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      padding: 40px;
      color: #1e293b;
    }

    .demo-area {
      background: white;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }

    h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .hint {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 10px;
      font-style: italic;
    }

    /* ==================================================== */
    /* CSS DE LOS PASOS — NO MODIFICAR ESTE BLOQUE          */
    /* (aquí se definen los estilos en conflicto)           */
    /* ==================================================== */

    /* PASO 1: selector de elemento (0,0,1) */
    p.demo {
      color: #6b7280;
      font-size: 1rem;
      line-height: 1.6;
    }

    /* PASO 2: clase (0,1,0) — mayor especificidad que el elemento */
    .texto-destacado {
      color: #0ea5e9;
      font-weight: 600;
    }

    /* PASO 3: ID (1,0,0) — mayor especificidad que la clase */
    #parrafo-especial {
      color: #16a34a;
      font-size: 1.1rem;
    }

    /* PASO 4: orden de aparición (desempate con igual especificidad) */
    .color-azul {
      color: #2563eb;
    }

    .color-verde {
      color: #16a34a;
    }

    /* ← Esta gana porque está DESPUÉS */

    /* PASO 5: herencia */
    .padre-heredado {
      color: #7c3aed;
      font-size: 1.1rem;
      border: 2px solid #7c3aed;
      padding: 16px;
    }

    /* Los hijos heredan color y font-size pero NO border ni padding */

    /* PASO 6: !important (antipatrón) */
    .btn-base {
      background: #0ea5e9;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      display: inline-block;
    }

    .btn-override {
      background: #f97316 !important;
    }

    /* !important fuerza orange */
    .btn-final {
      background: #ef4444 !important;
    }

    /* !important de nuevo para ganar */
  </style>
</head>
