<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#030712" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f9fafb" font-size="18" font-weight="700">Sistema de Botones — Variantes, Tamaños y Estados</text>

  <!-- =============================== -->
  <!-- COLUMN HEADERS (sizes)          -->
  <!-- =============================== -->
  <text x="200" y="72" text-anchor="middle" fill="#6b7280" font-size="10" letter-spacing="1">VARIANTE</text>
  <text x="450" y="72" text-anchor="middle" fill="#38bdf8" font-size="10" letter-spacing="1">sm</text>
  <text x="580" y="72" text-anchor="middle" fill="#38bdf8" font-size="10" letter-spacing="1">base</text>
  <text x="730" y="72" text-anchor="middle" fill="#38bdf8" font-size="10" letter-spacing="1">lg</text>

  <!-- Divider -->
  <line x1="20" x2="880" y1="82" y2="82" stroke="#1f2937" stroke-width="1"/>

  <!-- =============================== -->
  <!-- ROW 1: PRIMARY                  -->
  <!-- =============================== -->
  <text x="200" y="116" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="600">Primary</text>
  <text x="200" y="130" text-anchor="middle" fill="#6b7280" font-size="9" font-family="monospace">bg-sky-500</text>
  <!-- sm -->
  <rect x="408" y="100" width="84" height="22" rx="6" fill="#0ea5e9"/>
  <text x="450" y="115" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Button</text>
  <!-- base -->
  <rect x="524" y="96" width="112" height="28" rx="8" fill="#0ea5e9"/>
  <text x="580" y="114" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Button</text>
  <!-- lg -->
  <rect x="664" y="92" width="132" height="36" rx="10" fill="#0ea5e9"/>
  <text x="730" y="114" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Button</text>

  <!-- =============================== -->
  <!-- ROW 2: SECONDARY                -->
  <!-- =============================== -->
  <text x="200" y="166" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="600">Secondary</text>
  <text x="200" y="180" text-anchor="middle" fill="#6b7280" font-size="9" font-family="monospace">bg-gray-700</text>
  <rect x="408" y="150" width="84" height="22" rx="6" fill="#374151"/>
  <text x="450" y="165" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Button</text>
  <rect x="524" y="146" width="112" height="28" rx="8" fill="#374151"/>
  <text x="580" y="164" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Button</text>
  <rect x="664" y="142" width="132" height="36" rx="10" fill="#374151"/>
  <text x="730" y="164" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Button</text>

  <!-- =============================== -->
  <!-- ROW 3: OUTLINE                  -->
  <!-- =============================== -->
  <text x="200" y="216" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="600">Outline</text>
  <text x="200" y="230" text-anchor="middle" fill="#6b7280" font-size="9" font-family="monospace">border-gray-600</text>
  <rect x="408" y="200" width="84" height="22" rx="6" fill="transparent" stroke="#4b5563" stroke-width="1.5"/>
  <text x="450" y="215" text-anchor="middle" fill="#d1d5db" font-size="9" font-weight="600">Button</text>
  <rect x="524" y="196" width="112" height="28" rx="8" fill="transparent" stroke="#4b5563" stroke-width="1.5"/>
  <text x="580" y="214" text-anchor="middle" fill="#d1d5db" font-size="11" font-weight="600">Button</text>
  <rect x="664" y="192" width="132" height="36" rx="10" fill="transparent" stroke="#4b5563" stroke-width="1.5"/>
  <text x="730" y="214" text-anchor="middle" fill="#d1d5db" font-size="13" font-weight="600">Button</text>

  <!-- =============================== -->
  <!-- ROW 4: GHOST                    -->
  <!-- =============================== -->
  <text x="200" y="266" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="600">Ghost</text>
  <text x="200" y="280" text-anchor="middle" fill="#6b7280" font-size="9" font-family="monospace">text-gray-400</text>
  <rect x="408" y="250" width="84" height="22" rx="6" fill="transparent"/>
  <text x="450" y="265" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">Button</text>
  <rect x="524" y="246" width="112" height="28" rx="8" fill="transparent"/>
  <text x="580" y="264" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">Button</text>
  <rect x="664" y="242" width="132" height="36" rx="10" fill="transparent"/>
  <text x="730" y="264" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600">Button</text>

  <!-- =============================== -->
  <!-- ROW 5: DESTRUCTIVE              -->
  <!-- =============================== -->
  <text x="200" y="316" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="600">Destructive</text>
  <text x="200" y="330" text-anchor="middle" fill="#6b7280" font-size="9" font-family="monospace">bg-red-600</text>
  <rect x="408" y="300" width="84" height="22" rx="6" fill="#dc2626"/>
  <text x="450" y="315" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Button</text>
  <rect x="524" y="296" width="112" height="28" rx="8" fill="#dc2626"/>
  <text x="580" y="314" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Button</text>
  <rect x="664" y="292" width="132" height="36" rx="10" fill="#dc2626"/>
  <text x="730" y="314" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Button</text>

  <!-- Divider -->
  <line x1="20" x2="880" y1="352" y2="352" stroke="#1f2937" stroke-width="1"/>

  <!-- =============================== -->
  <!-- BOTTOM: STATES ROW              -->
  <!-- =============================== -->
  <text x="450" y="378" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">Estados interactivos</text>

  <!-- Normal -->
  <rect x="48" y="394" width="88" height="28" rx="8" fill="#0ea5e9"/>
  <text x="92" y="412" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Normal</text>
  <text x="92" y="434" text-anchor="middle" fill="#6b7280" font-size="8">base</text>

  <!-- Hover -->
  <rect x="164" y="394" width="88" height="28" rx="8" fill="#38bdf8"/>
  <text x="208" y="412" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Hover</text>
  <text x="208" y="434" text-anchor="middle" fill="#6b7280" font-size="8">hover:bg-sky-400</text>

  <!-- Focus ring -->
  <rect x="280" y="390" width="88" height="36" rx="8" fill="#0ea5e9" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="none"/>
  <rect x="278" y="388" width="92" height="40" rx="10" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <text x="324" y="412" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Focus</text>
  <text x="324" y="434" text-anchor="middle" fill="#6b7280" font-size="8">focus-visible:ring-2</text>

  <!-- Active -->
  <rect x="396" y="396" width="88" height="28" rx="8" fill="#0369a1"/>
  <text x="440" y="414" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Active</text>
  <text x="440" y="434" text-anchor="middle" fill="#6b7280" font-size="8">active:bg-sky-700</text>

  <!-- Disabled -->
  <rect x="512" y="394" width="88" height="28" rx="8" fill="#0ea5e9" opacity="0.4"/>
  <text x="556" y="412" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Disabled</text>
  <text x="556" y="434" text-anchor="middle" fill="#6b7280" font-size="8">disabled:opacity-50</text>

  <!-- Loading -->
  <rect x="628" y="394" width="120" height="28" rx="8" fill="#0ea5e9" opacity="0.7"/>
  <!-- Spinner simulation -->
  <circle cx="651" cy="408" r="6" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="12,6" opacity="0.4"/>
  <path d="M651 402 A6 6 0 0 1 657 408" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <text x="705" y="412" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Cargando...</text>
  <text x="688" y="434" text-anchor="middle" fill="#6b7280" font-size="8">animate-spin</text>

  <!-- Button Group -->
  <rect x="760" y="394" width="120" height="28" rx="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <line x1="790" x2="790" y1="394" y2="422" stroke="#374151" stroke-width="1"/>
  <line x1="820" x2="820" y1="394" y2="422" stroke="#374151" stroke-width="1"/>
  <line x1="851" x2="851" y1="394" y2="422" stroke="#374151" stroke-width="1"/>
  <text x="775" y="412" text-anchor="middle" fill="#9ca3af" font-size="8">D</text>
  <rect x="791" y="394" width="29" height="28" fill="#1d4ed8"/>
  <text x="805" y="412" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">S</text>
  <text x="835" y="412" text-anchor="middle" fill="#9ca3af" font-size="8">M</text>
  <text x="865" y="412" text-anchor="middle" fill="#9ca3af" font-size="8">A</text>
  <text x="820" y="434" text-anchor="middle" fill="#6b7280" font-size="8">Button Group</text>

  <!-- Size legend -->
  <text x="48" y="472" fill="#4b5563" font-size="9" font-family="monospace">sm: px-3 py-1.5 text-xs rounded-md</text>
  <text x="48" y="486" fill="#4b5563" font-size="9" font-family="monospace">base: px-5 py-2.5 text-sm rounded-lg</text>
  <text x="48" y="500" fill="#4b5563" font-size="9" font-family="monospace">lg: px-7 py-3.5 text-base rounded-xl</text>
</svg>
