<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, Roboto, system-ui, sans-serif">

  <!-- Background -->
  <rect width="800" height="500" fill="#030712"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#F9FAFB">flex-grow y flex-shrink</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#6B7280">cómo los ítems distribuyen y respetan el espacio</text>

  <!-- ===== SECTION 1: flex-grow ===== -->
  <!-- Subtitle -->
  <text x="30" y="90" font-size="13" font-weight="700" fill="#38BDF8">grow — absorber el espacio libre</text>

  <!-- Container 1: Sin grow -->
  <rect x="30" y="100" width="740" height="54" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
  <text x="44" y="115" font-size="9" fill="#6B7280">Sin grow — los ítems solo ocupan su tamaño natural</text>
  <rect x="44" y="121" width="100" height="26" rx="4" fill="#374151"/>
  <text x="94" y="138" text-anchor="middle" font-size="10" fill="#9CA3AF">Ítem A</text>
  <rect x="152" y="121" width="110" height="26" rx="4" fill="#374151"/>
  <text x="207" y="138" text-anchor="middle" font-size="10" fill="#9CA3AF">Ítem B (más largo)</text>
  <rect x="270" y="121" width="80" height="26" rx="4" fill="#374151"/>
  <text x="310" y="138" text-anchor="middle" font-size="10" fill="#9CA3AF">Ítem C</text>
  <!-- Espacio vacío indicator -->
  <rect x="358" y="121" width="398" height="26" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="557" y="138" text-anchor="middle" font-size="10" fill="#4B5563">espacio libre sin usar →</text>

  <!-- Container 2: Con grow en un ítem -->
  <rect x="30" y="164" width="740" height="54" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
  <text x="44" y="179" font-size="9" fill="#38BDF8">Con grow en el ítem central — absorbe TODO el espacio libre</text>
  <rect x="44" y="185" width="100" height="26" rx="4" fill="#1E3A5F"/>
  <text x="94" y="202" text-anchor="middle" font-size="10" fill="#93C5FD">flex-none</text>
  <rect x="152" y="185" width="474" height="26" rx="4" fill="#1D4ED8"/>
  <text x="389" y="202" text-anchor="middle" font-size="10" fill="#BFDBFE" font-weight="600">grow → ocupa todo el espacio restante</text>
  <rect x="634" y="185" width="122" height="26" rx="4" fill="#1E3A5F"/>
  <text x="695" y="202" text-anchor="middle" font-size="10" fill="#93C5FD">flex-none</text>

  <!-- Container 3: Todos con grow -->
  <rect x="30" y="228" width="740" height="54" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
  <text x="44" y="243" font-size="9" fill="#38BDF8">Todos con grow — espacio dividido equitativamente (1:1:1)</text>
  <rect x="44" y="249" width="228" height="26" rx="4" fill="#1E40AF"/>
  <text x="158" y="266" text-anchor="middle" font-size="10" fill="#BFDBFE">1/3</text>
  <rect x="280" y="249" width="228" height="26" rx="4" fill="#2563EB"/>
  <text x="394" y="266" text-anchor="middle" font-size="10" fill="#DBEAFE">1/3</text>
  <rect x="516" y="249" width="240" height="26" rx="4" fill="#3B82F6"/>
  <text x="636" y="266" text-anchor="middle" font-size="10" fill="#EFF6FF">1/3</text>

  <!-- ===== SECTION 2: flex-shrink ===== -->
  <text x="30" y="308" font-size="13" font-weight="700" fill="#FB923C">shrink-0 — proteger el tamaño de ítems importantes</text>

  <!-- Container without shrink-0 -->
  <rect x="30" y="318" width="340" height="80" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
  <text x="44" y="332" font-size="9" fill="#6B7280">Sin shrink-0 — imagen se deforma</text>
  <rect x="44" y="338" width="30" height="30" rx="15" fill="#374151"/>
  <text x="59" y="357" text-anchor="middle" font-size="14" fill="#6B7280">👤</text>
  <rect x="82" y="338" width="248" height="12" rx="2" fill="#374151"/>
  <rect x="82" y="356" width="180" height="10" rx="2" fill="#1F2937"/>
  <!-- deformed image indicator -->
  <text x="204" y="388" text-anchor="middle" font-size="9" fill="#EF4444">⚠ imagen comprimida</text>

  <!-- Container with shrink-0 -->
  <rect x="390" y="318" width="380" height="80" rx="8" fill="#0F2D20" stroke="#34D399" stroke-width="1.5"/>
  <text x="404" y="332" font-size="9" fill="#34D399">Con shrink-0 + min-w-0 — imagen fija, texto truncado</text>
  <rect x="404" y="338" width="36" height="36" rx="18" fill="#065F46"/>
  <text x="422" y="361" text-anchor="middle" font-size="16">👤</text>
  <!-- shrink-0 badge -->
  <rect x="404" y="377" width="50" height="12" rx="2" fill="#064E3B" stroke="#34D399" stroke-width="0.5"/>
  <text x="429" y="386" text-anchor="middle" font-size="7" fill="#34D399">shrink-0</text>
  <!-- Text truncated -->
  <rect x="448" y="338" width="260" height="12" rx="2" fill="#374151"/>
  <rect x="448" y="356" width="180" height="10" rx="2" fill="#1F2937"/>
  <!-- truncate indicator -->
  <line x1="706" y1="338" x2="706" y2="366" stroke="#34D399" stroke-width="1.5"/>
  <!-- min-w-0 label -->
  <rect x="448" y="377" width="50" height="12" rx="2" fill="#064E3B" stroke="#34D399" stroke-width="0.5"/>
  <text x="473" y="386" text-anchor="middle" font-size="7" fill="#34D399">min-w-0</text>
  <text x="558" y="386" font-size="8" fill="#34D399">+ truncate ✓</text>

  <!-- ===== SECTION 3: Reference table ===== -->
  <rect x="30" y="420" width="740" height="66" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <text x="50" y="440" font-size="12" font-weight="700" fill="#F9FAFB">Clases flex-* de Tailwind</text>

  <!-- Table headers -->
  <text x="60" y="458" font-size="10" font-weight="600" fill="#6B7280">Clase</text>
  <text x="160" y="458" font-size="10" font-weight="600" fill="#6B7280">grow</text>
  <text x="230" y="458" font-size="10" font-weight="600" fill="#6B7280">shrink</text>
  <text x="300" y="458" font-size="10" font-weight="600" fill="#6B7280">basis</text>
  <text x="380" y="458" font-size="10" font-weight="600" fill="#6B7280">Uso principal</text>

  <!-- Row 1 -->
  <text x="60" y="474" font-size="10" font-family="monospace" fill="#38BDF8">flex-1</text>
  <text x="160" y="474" font-size="10" fill="#34D399">1</text>
  <text x="230" y="474" font-size="10" fill="#34D399">1</text>
  <text x="300" y="474" font-size="10" fill="#9CA3AF">0%</text>
  <text x="380" y="474" font-size="10" fill="#D1D5DB">⭐ Área principal · ocupa el espacio disponible</text>

  <!-- Row 2 -->
  <text x="60" y="488" font-size="10" font-family="monospace" fill="#FB923C">flex-none</text>
  <text x="160" y="488" font-size="10" fill="#EF4444">0</text>
  <text x="230" y="488" font-size="10" fill="#EF4444">0</text>
  <text x="300" y="488" font-size="10" fill="#9CA3AF">auto</text>
  <text x="380" y="488" font-size="10" fill="#D1D5DB">Sidebar · logo · avatar · tamaño completamente fijo</text>

</svg>
