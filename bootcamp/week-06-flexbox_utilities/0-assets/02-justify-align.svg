<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Inter, Roboto, system-ui, sans-serif">

  <!-- Background -->
  <rect width="800" height="560" fill="#030712"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#F9FAFB">justify-* e items-* en Flexbox</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#6B7280">distribución en eje principal vs. alineación en eje cruzado</text>

  <!-- ===== JUSTIFY SECTION (left column) ===== -->
  <text x="30" y="90" font-size="13" font-weight="700" fill="#38BDF8">justify-content (eje principal →)</text>

  <!-- justify-start -->
  <rect x="30" y="100" width="360" height="44" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="36" y="116" font-size="9" font-family="monospace" fill="#38BDF8">justify-start</text>
  <rect x="36" y="120" width="50" height="16" rx="3" fill="#1E40AF"/>
  <rect x="92" y="120" width="50" height="16" rx="3" fill="#1E40AF"/>
  <rect x="148" y="120" width="50" height="16" rx="3" fill="#1E40AF"/>

  <!-- justify-center -->
  <rect x="30" y="152" width="360" height="44" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="36" y="168" font-size="9" font-family="monospace" fill="#38BDF8">justify-center</text>
  <rect x="130" y="172" width="50" height="16" rx="3" fill="#1D4ED8"/>
  <rect x="186" y="172" width="50" height="16" rx="3" fill="#1D4ED8"/>
  <rect x="242" y="172" width="50" height="16" rx="3" fill="#1D4ED8"/>

  <!-- justify-end -->
  <rect x="30" y="204" width="360" height="44" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="36" y="220" font-size="9" font-family="monospace" fill="#38BDF8">justify-end</text>
  <rect x="218" y="224" width="50" height="16" rx="3" fill="#2563EB"/>
  <rect x="274" y="224" width="50" height="16" rx="3" fill="#2563EB"/>
  <rect x="330" y="224" width="50" height="16" rx="3" fill="#2563EB"/>

  <!-- justify-between ⭐ -->
  <rect x="30" y="256" width="360" height="44" rx="6" fill="#0F2D4A" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="36" y="272" font-size="9" font-family="monospace" fill="#38BDF8">justify-between ⭐</text>
  <rect x="36" y="276" width="60" height="16" rx="3" fill="#38BDF8"/>
  <text x="66" y="288" text-anchor="middle" font-size="8" fill="#0F172A" font-weight="700">logo</text>
  <rect x="176" y="276" width="50" height="16" rx="3" fill="#7DD3FC"/>
  <text x="201" y="288" text-anchor="middle" font-size="8" fill="#0F172A">nav</text>
  <rect x="318" y="276" width="66" height="16" rx="3" fill="#38BDF8"/>
  <text x="351" y="288" text-anchor="middle" font-size="8" fill="#0F172A" font-weight="700">CTA</text>

  <!-- justify-around -->
  <rect x="30" y="308" width="360" height="44" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="36" y="324" font-size="9" font-family="monospace" fill="#6B7280">justify-around</text>
  <rect x="54" y="328" width="50" height="16" rx="3" fill="#374151"/>
  <rect x="155" y="328" width="50" height="16" rx="3" fill="#374151"/>
  <rect x="256" y="328" width="50" height="16" rx="3" fill="#374151"/>
  <!-- Space indicators -->
  <text x="42" y="344" font-size="8" fill="#6B7280">|←</text>
  <text x="104" y="344" font-size="8" fill="#6B7280">→|←</text>
  <text x="205" y="344" font-size="8" fill="#6B7280">→|←</text>
  <text x="306" y="344" font-size="8" fill="#6B7280">→|</text>

  <!-- justify-evenly -->
  <rect x="30" y="360" width="360" height="44" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="36" y="376" font-size="9" font-family="monospace" fill="#6B7280">justify-evenly</text>
  <rect x="60" y="380" width="50" height="16" rx="3" fill="#374151"/>
  <rect x="155" y="380" width="50" height="16" rx="3" fill="#374151"/>
  <rect x="250" y="380" width="50" height="16" rx="3" fill="#374151"/>
  <!-- Equal space indicators -->
  <text x="38" y="378" font-size="8" fill="#9CA3AF">←→</text>
  <text x="113" y="378" font-size="8" fill="#9CA3AF">←→</text>
  <text x="208" y="378" font-size="8" fill="#9CA3AF">←→</text>
  <text x="303" y="378" font-size="8" fill="#9CA3AF">←→</text>

  <!-- Vertical separator -->
  <line x1="410" y1="80" x2="410" y2="415" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===== ITEMS SECTION (right column) ===== -->
  <text x="420" y="90" font-size="13" font-weight="700" fill="#A78BFA">align-items (eje cruzado ↕)</text>

  <!-- items-start -->
  <rect x="420" y="100" width="360" height="60" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="426" y="116" font-size="9" font-family="monospace" fill="#A78BFA">items-start</text>
  <rect x="426" y="120" width="60" height="32" rx="3" fill="#4C1D95"/>
  <rect x="492" y="120" width="60" height="20" rx="3" fill="#5B21B6"/>
  <rect x="558" y="120" width="60" height="12" rx="3" fill="#6D28D9"/>

  <!-- items-center ⭐ -->
  <rect x="420" y="168" width="360" height="60" rx="6" fill="#1A0E3A" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="426" y="184" font-size="9" font-family="monospace" fill="#A78BFA">items-center ⭐</text>
  <rect x="426" y="184" width="60" height="32" rx="3" fill="#7C3AED"/>
  <rect x="492" y="190" width="60" height="20" rx="3" fill="#8B5CF6"/>
  <rect x="558" y="194" width="60" height="12" rx="3" fill="#A78BFA"/>

  <!-- items-end -->
  <rect x="420" y="236" width="360" height="60" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="426" y="252" font-size="9" font-family="monospace" fill="#A78BFA">items-end</text>
  <rect x="426" y="240" width="60" height="32" rx="3" fill="#4C1D95"/>
  <rect x="492" y="252" width="60" height="20" rx="3" fill="#5B21B6"/>
  <rect x="558" y="260" width="60" height="12" rx="3" fill="#6D28D9"/>

  <!-- items-stretch -->
  <rect x="420" y="304" width="360" height="60" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="426" y="320" font-size="9" font-family="monospace" fill="#6B7280">items-stretch (default)</text>
  <rect x="426" y="320" width="60" height="36" rx="3" fill="#374151"/>
  <rect x="492" y="320" width="60" height="36" rx="3" fill="#374151"/>
  <rect x="558" y="320" width="60" height="36" rx="3" fill="#374151"/>

  <!-- items-baseline -->
  <rect x="420" y="372" width="360" height="44" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="426" y="388" font-size="9" font-family="monospace" fill="#6B7280">items-baseline</text>
  <text x="440" y="408" font-size="22" font-weight="900" fill="#374151">$99</text>
  <text x="490" y="408" font-size="14" fill="#374151">/user</text>
  <text x="538" y="408" font-size="10" fill="#374151">/month</text>
  <line x1="426" y1="410" x2="770" y2="410" stroke="#FCD34D" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="736" y="408" font-size="8" fill="#FCD34D">baseline</text>

  <!-- ===== BOTTOM: self-* ===== -->
  <rect x="30" y="428" width="740" height="108" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <text x="50" y="450" font-size="13" font-weight="700" fill="#34D399">self-* — alineación individual del ítem</text>
  <text x="50" y="466" font-size="10" fill="#6B7280">El contenedor tiene items-start · Cada ítem se alinea de forma independiente</text>

  <rect x="50" y="476" width="140" height="50" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="56" y="480" width="80" height="14" rx="3" fill="#374151"/>
  <text x="96" y="490" text-anchor="middle" font-size="8" fill="#9CA3AF">Normal (start)</text>

  <rect x="210" y="476" width="140" height="50" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="216" y="493" width="80" height="14" rx="3" fill="#0EA5E9"/>
  <text x="256" y="503" text-anchor="middle" font-size="8" fill="#E0F2FE">self-center</text>

  <rect x="370" y="476" width="140" height="50" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="376" y="508" width="80" height="14" rx="3" fill="#8B5CF6"/>
  <text x="416" y="518" text-anchor="middle" font-size="8" fill="#EDE9FE">self-end</text>

  <rect x="530" y="476" width="140" height="50" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="536" y="480" width="80" height="46" rx="3" fill="#065F46"/>
  <text x="576" y="507" text-anchor="middle" font-size="8" fill="#6EE7B7">self-stretch</text>

</svg>
