<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, Roboto, system-ui, sans-serif">

  <!-- Background -->
  <rect width="800" height="520" fill="#030712"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#F9FAFB">Patrones de Layout Flexbox</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#6B7280">los 4 patrones más usados en desarrollo web moderno</text>

  <!-- ===== PATTERN 1: NAVBAR ===== -->
  <text x="30" y="86" font-size="12" font-weight="700" fill="#38BDF8">① Navbar — justify-between</text>
  <rect x="30" y="94" width="740" height="50" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>
  <!-- Logo -->
  <rect x="44" y="108" width="80" height="22" rx="6" fill="#0EA5E9"/>
  <text x="84" y="123" text-anchor="middle" font-size="10" font-weight="700" fill="white">Logo</text>
  <!-- Center nav links -->
  <rect x="310" y="114" width="50" height="10" rx="2" fill="#374151"/>
  <rect x="370" y="114" width="50" height="10" rx="2" fill="#374151"/>
  <rect x="430" y="114" width="50" height="10" rx="2" fill="#374151"/>
  <!-- CTA -->
  <rect x="666" y="108" width="90" height="22" rx="6" fill="#38BDF8"/>
  <text x="711" y="123" text-anchor="middle" font-size="10" font-weight="700" fill="#0F172A">Empezar</text>
  <!-- Arrows showing justify-between -->
  <text x="160" y="122" font-size="24" fill="#38BDF8" opacity="0.4">←      →</text>
  <text x="196" y="130" font-size="8" fill="#38BDF8">justify-between</text>

  <!-- ===== PATTERN 2: CENTRADO PERFECTO ===== -->
  <text x="30" y="166" font-size="12" font-weight="700" fill="#A78BFA">② Centrado Perfecto — flex items-center justify-center</text>
  <rect x="30" y="174" width="360" height="100" rx="8" fill="#0F0A2A" stroke="#4C1D95" stroke-width="1.5"/>
  <!-- Centering arrows -->
  <line x1="200" y1="182" x2="200" y2="268" stroke="#A78BFA" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="38" y1="224" x2="382" y2="224" stroke="#A78BFA" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <!-- Content box -->
  <rect x="110" y="196" width="180" height="56" rx="8" fill="#2E1065" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#C4B5FD">Contenido</text>
  <text x="200" y="238" text-anchor="middle" font-size="9" fill="#8B5CF6">centrado perfectamente</text>
  <!-- Labels -->
  <text x="400" y="192" font-size="10" fill="#A78BFA">flex</text>
  <text x="400" y="208" font-size="10" fill="#A78BFA">items-center</text>
  <text x="400" y="224" font-size="10" fill="#A78BFA">justify-center</text>
  <text x="400" y="244" font-size="9" fill="#6B7280">= 3 clases para</text>
  <text x="400" y="258" font-size="9" fill="#6B7280">centrar cualquier cosa</text>

  <!-- ===== PATTERN 3: SIDEBAR + MAIN ===== -->
  <text x="30" y="296" font-size="12" font-weight="700" fill="#34D399">③ Sidebar + Main — flex-none + flex-1</text>
  <rect x="30" y="304" width="740" height="100" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Sidebar: flex-none w-48 -->
  <rect x="38" y="312" width="120" height="84" rx="6" fill="#0D2A1F" stroke="#065F46" stroke-width="1.5"/>
  <text x="98" y="332" text-anchor="middle" font-size="9" font-weight="700" fill="#34D399">SIDEBAR</text>
  <text x="98" y="346" text-anchor="middle" font-size="8" font-family="monospace" fill="#6EE7B7">flex-none w-48</text>
  <rect x="48" y="354" width="80" height="6" rx="2" fill="#374151"/>
  <rect x="48" y="366" width="80" height="6" rx="2" fill="#374151"/>
  <rect x="48" y="378" width="80" height="6" rx="2" fill="#374151"/>

  <!-- Separator -->
  <line x1="162" y1="312" x2="162" y2="396" stroke="#374151" stroke-width="1"/>

  <!-- Main: flex-1 -->
  <rect x="168" y="312" width="590" height="84" rx="4" fill="#0A1628" stroke="#1E3A5F" stroke-width="1"/>
  <text x="463" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#3B82F6">MAIN CONTENT</text>
  <text x="463" y="360" text-anchor="middle" font-size="9" font-family="monospace" fill="#60A5FA">flex-1 → ocupa TODO el espacio restante</text>
  <text x="463" y="376" text-anchor="middle" font-size="9" fill="#4B5563">overflow-auto para scroll independiente</text>

  <!-- Brace showing flex-1 -->
  <text x="180" y="400" font-size="8" fill="#374151">←</text>
  <text x="190" y="400" font-size="8" fill="#374151">flex-none (fijo)</text>
  <text x="280" y="400" font-size="8" fill="#1E40AF">←────────────── flex-1 (expansible) ──────────────────→</text>

  <!-- ===== PATTERN 4: LIST ITEM ===== -->
  <text x="30" y="426" font-size="12" font-weight="700" fill="#FB923C">④ Lista con Avatar — shrink-0 + flex-1 + min-w-0</text>
  <rect x="30" y="434" width="740" height="60" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Avatar: shrink-0 -->
  <rect x="44" y="452" width="36" height="36" rx="18" fill="#7C2D12"/>
  <text x="62" y="474" text-anchor="middle" font-size="16">👤</text>
  <rect x="44" y="490" width="36" height="10" rx="2" fill="#431407" stroke="#F97316" stroke-width="0.5"/>
  <text x="62" y="498" text-anchor="middle" font-size="7" fill="#FB923C">shrink-0</text>

  <!-- Text area: flex-1 min-w-0 -->
  <rect x="90" y="452" width="490" height="14" rx="2" fill="#374151"/>
  <rect x="90" y="470" width="320" height="10" rx="2" fill="#1F2937"/>
  <rect x="90" y="490" width="80" height="10" rx="2" fill="#1C2744" stroke="#2563EB" stroke-width="0.5"/>
  <text x="130" y="498" text-anchor="middle" font-size="7" fill="#60A5FA">flex-1 min-w-0</text>
  <text x="400" y="466" font-size="9" fill="#6B7280">← truncate funciona gracias a min-w-0 →</text>

  <!-- Badge: flex-none -->
  <rect x="594" y="457" width="60" height="20" rx="10" fill="#052E16" stroke="#16A34A" stroke-width="1"/>
  <text x="624" y="471" text-anchor="middle" font-size="9" fill="#4ADE80">Admin</text>
  <rect x="594" y="490" width="60" height="10" rx="2" fill="#052E16" stroke="#16A34A" stroke-width="0.5"/>
  <text x="624" y="498" text-anchor="middle" font-size="7" fill="#4ADE80">flex-none</text>

  <!-- Action button: flex-none -->
  <rect x="668" y="457" width="28" height="28" rx="6" fill="#1F2937"/>
  <text x="682" y="474" text-anchor="middle" font-size="14" fill="#6B7280">⋮</text>
  <rect x="668" y="490" width="28" height="10" rx="2" fill="#1F2937" stroke="#374151" stroke-width="0.5"/>
  <text x="682" y="498" text-anchor="middle" font-size="7" fill="#6B7280">flex-none</text>

</svg>
