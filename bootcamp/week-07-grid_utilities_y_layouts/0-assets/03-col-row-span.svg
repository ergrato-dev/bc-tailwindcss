<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="560" fill="#030712"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#f9fafb">col-span-* y row-span-*</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#6b7280">Celdas que se extienden en columnas, filas, o ambas (Bento Box)</text>

  <!-- ─── PANEL 1: col-span examples ─── -->
  <rect x="30" y="82" width="420" height="220" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="240" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#f9fafb">col-span-*</text>

  <!-- 4-col grid: col-span-1, col-span-2, col-span-full -->
  <!-- Row 1: 2x col-span-1 + col-span-2 -->
  <!-- col-span-1 -->
  <rect x="46" y="114" width="84" height="54" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="88" y="136" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">col-span-1</text>
  <text x="88" y="150" text-anchor="middle" font-size="9" fill="#64748b">1 de 4 cols</text>
  <!-- col-span-1 again -->
  <rect x="138" y="114" width="84" height="54" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="180" y="136" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">col-span-1</text>
  <text x="180" y="150" text-anchor="middle" font-size="9" fill="#64748b">1 de 4 cols</text>
  <!-- col-span-2 highlighted -->
  <rect x="230" y="114" width="172" height="54" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="316" y="136" text-anchor="middle" font-size="9" font-weight="700" fill="#38bdf8">col-span-2</text>
  <text x="316" y="150" text-anchor="middle" font-size="9" fill="#7dd3fc">ocupa 2 columnas</text>

  <!-- Row 2: col-span-3 + col-span-1 -->
  <rect x="46" y="178" width="258" height="54" rx="6" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="2"/>
  <text x="175" y="200" text-anchor="middle" font-size="9" font-weight="700" fill="#0ea5e9">col-span-3</text>
  <text x="175" y="214" text-anchor="middle" font-size="9" fill="#7dd3fc">ocupa 3 columnas</text>
  <rect x="312" y="178" width="90" height="54" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="357" y="200" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">col-span-1</text>

  <!-- Row 3: col-span-full -->
  <rect x="46" y="242" width="356" height="44" rx="6" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
  <text x="224" y="261" text-anchor="middle" font-size="9" font-weight="700" fill="#38bdf8">col-span-full</text>
  <text x="224" y="275" text-anchor="middle" font-size="9" fill="#7dd3fc">ocupa TODAS las columnas → CTA, banners</text>

  <!-- ─── PANEL 2: row-span examples ─── -->
  <rect x="510" y="82" width="420" height="220" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="720" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#f9fafb">row-span-*</text>

  <!-- 3-col grid with a row-span-2 on left -->
  <!-- row-span-2 image area (left) -->
  <rect x="526" y="114" width="100" height="172" rx="6" fill="#0c2d48" stroke="#0ea5e9" stroke-width="2"/>
  <text x="576" y="191" text-anchor="middle" font-size="9" font-weight="700" fill="#0ea5e9">row-span-2</text>
  <text x="576" y="205" text-anchor="middle" font-size="9" fill="#7dd3fc">imagen tall</text>
  <text x="576" y="219" text-anchor="middle" font-size="9" fill="#7dd3fc">ocupa 2 filas</text>

  <!-- right side: 2 stacked cells -->
  <rect x="636" y="114" width="120" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="696" y="150" text-anchor="middle" font-size="9" fill="#64748b">row 1, col 2</text>
  <rect x="636" y="204" width="120" height="82" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="696" y="241" text-anchor="middle" font-size="9" fill="#64748b">row 2, col 2</text>

  <rect x="766" y="114" width="118" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="825" y="150" text-anchor="middle" font-size="9" fill="#64748b">row 1, col 3</text>
  <rect x="766" y="204" width="118" height="82" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="825" y="241" text-anchor="middle" font-size="9" fill="#64748b">row 2, col 3</text>

  <!-- Label: row-span note -->
  <text x="576" y="305" text-anchor="middle" font-size="9" fill="#475569">span 2 rows ↕</text>

  <!-- ─── PANEL 3: BENTO BOX ─── -->
  <rect x="30" y="330" width="900" height="200" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="480" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#f9fafb">Bento Box Pattern — combinando col-span + row-span</text>

  <!-- 4-col x 2-row bento grid -->
  <!-- Big item: col-span-2 row-span-2 -->
  <rect x="50" y="362" width="210" height="152" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="155" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">col-span-2</text>
  <text x="155" y="444" text-anchor="middle" font-size="9" fill="#7dd3fc">row-span-2</text>
  <text x="155" y="460" text-anchor="middle" font-size="9" fill="#475569">feature principal</text>

  <!-- Top-right: 2 smaller items col-span-1 row-span-1 -->
  <rect x="270" y="362" width="100" height="70" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="320" y="390" text-anchor="middle" font-size="9" fill="#94a3b8">stat</text>
  <text x="320" y="404" text-anchor="middle" font-size="9" fill="#64748b">1×1</text>

  <rect x="380" y="362" width="100" height="70" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="430" y="390" text-anchor="middle" font-size="9" fill="#94a3b8">stat</text>
  <text x="430" y="404" text-anchor="middle" font-size="9" fill="#64748b">1×1</text>

  <!-- col-span-2 middle-right -->
  <rect x="490" y="362" width="210" height="70" rx="6" fill="#1a2e1a" stroke="#16a34a" stroke-width="1"/>
  <text x="595" y="393" text-anchor="middle" font-size="9" font-weight="600" fill="#4ade80">col-span-2 / row-span-1</text>
  <text x="595" y="407" text-anchor="middle" font-size="9" fill="#64748b">wide feature</text>

  <!-- col-span-1 each (bottom row) - 4 cells -->
  <rect x="270" y="442" width="100" height="70" rx="6" fill="#2d1f3d" stroke="#7c3aed" stroke-width="1"/>
  <text x="320" y="476" text-anchor="middle" font-size="9" fill="#c4b5fd">card</text>
  <rect x="380" y="442" width="100" height="70" rx="6" fill="#2d1f3d" stroke="#7c3aed" stroke-width="1"/>
  <text x="430" y="476" text-anchor="middle" font-size="9" fill="#c4b5fd">card</text>
  <rect x="490" y="442" width="100" height="70" rx="6" fill="#2d1f3d" stroke="#7c3aed" stroke-width="1"/>
  <text x="540" y="476" text-anchor="middle" font-size="9" fill="#c4b5fd">card</text>
  <rect x="600" y="442" width="100" height="70" rx="6" fill="#2d1f3d" stroke="#7c3aed" stroke-width="1"/>
  <text x="650" y="476" text-anchor="middle" font-size="9" fill="#c4b5fd">card</text>

  <!-- col-span-2 bottom-right (last area) -->
  <rect x="710" y="362" width="200" height="150" rx="6" fill="#1a2535" stroke="#475569" stroke-width="1"/>
  <text x="810" y="430" text-anchor="middle" font-size="9" fill="#94a3b8">col-span-2</text>
  <text x="810" y="444" text-anchor="middle" font-size="9" fill="#64748b">row-span-2</text>
</svg>
