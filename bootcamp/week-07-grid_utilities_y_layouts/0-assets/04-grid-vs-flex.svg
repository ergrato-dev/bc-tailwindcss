<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="600" fill="#030712"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#f9fafb">Grid vs Flexbox — ¿Cuándo usar cada uno?</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#6b7280">Regla principal: Flex → 1D (fila o columna) · Grid → 2D (filas y columnas)</text>

  <!-- ─── CENTER: Decision rule ─── -->
  <rect x="360" y="82" width="240" height="90" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="480" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#f9fafb">¿Tu layout es…?</text>
  <!-- Branch 1D -->
  <text x="400" y="136" text-anchor="middle" font-size="11" fill="#fbbf24">1D (una dirección)</text>
  <text x="400" y="152" text-anchor="middle" font-size="10" fill="#6b7280">→ usa Flexbox</text>
  <!-- Branch 2D -->
  <text x="570" y="136" text-anchor="middle" font-size="11" fill="#38bdf8">2D (filas + cols)</text>
  <text x="570" y="152" text-anchor="middle" font-size="10" fill="#6b7280">→ usa Grid</text>

  <!-- Arrow left (to Flex) -->
  <line x1="360" y1="130" x2="290" y2="130" stroke="#fbbf24" stroke-width="1.5"/>
  <polygon points="290,126 279,130 290,134" fill="#fbbf24"/>

  <!-- Arrow right (to Grid) -->
  <line x1="600" y1="130" x2="670" y2="130" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="670,126 681,130 670,134" fill="#38bdf8"/>

  <!-- ─── FLEX PANEL (left) ─── -->
  <rect x="30" y="82" width="310" height="480" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="30" y="82" width="310" height="48" rx="12" fill="#1c1702"/>
  <rect x="30" y="112" width="310" height="18" rx="0" fill="#1c1702"/>
  <!-- title -->
  <text x="185" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">Flexbox</text>
  <text x="185" y="128" text-anchor="middle" font-size="10" fill="#a16207">Diseño unidimensional (fila ó columna)</text>

  <!-- Flex pattern: Navbar -->
  <text x="50" y="158" font-size="11" font-weight="600" fill="#fbbf24">Navbar</text>
  <rect x="50" y="166" width="270" height="36" rx="6" fill="#1c1702" stroke="#854d0e" stroke-width="1"/>
  <!-- items inline -->
  <rect x="58" y="174" width="44" height="20" rx="3" fill="#78350f"/>
  <text x="80" y="188" text-anchor="middle" font-size="8" fill="#fcd34d">Logo</text>
  <rect x="110" y="174" width="30" height="20" rx="3" fill="#451a03"/>
  <text x="125" y="188" text-anchor="middle" font-size="8" fill="#fbbf24">Link</text>
  <rect x="148" y="174" width="30" height="20" rx="3" fill="#451a03"/>
  <text x="163" y="188" text-anchor="middle" font-size="8" fill="#fbbf24">Link</text>
  <rect x="186" y="174" width="30" height="20" rx="3" fill="#451a03"/>
  <text x="201" y="188" text-anchor="middle" font-size="8" fill="#fbbf24">Link</text>
  <rect x="268" y="174" width="44" height="20" rx="3" fill="#78350f"/>
  <text x="290" y="188" text-anchor="middle" font-size="8" fill="#fcd34d">CTA</text>
  <text x="185" y="218" text-anchor="middle" font-size="9" fill="#64748b">flex justify-between items-center</text>

  <!-- Flex pattern: Buttons -->
  <text x="50" y="240" font-size="11" font-weight="600" fill="#fbbf24">Botones con íconos</text>
  <rect x="50" y="248" width="270" height="36" rx="6" fill="#1c1702" stroke="#854d0e" stroke-width="1"/>
  <rect x="60" y="256" width="80" height="20" rx="10" fill="#78350f"/>
  <text x="88" y="270" text-anchor="middle" font-size="8" fill="#fcd34d">⬇ Descargar</text>
  <rect x="152" y="256" width="60" height="20" rx="10" fill="#451a03" stroke="#92400e"/>
  <text x="182" y="270" text-anchor="middle" font-size="8" fill="#fbbf24">✏ Editar</text>
  <text x="185" y="300" text-anchor="middle" font-size="9" fill="#64748b">flex items-center gap-2</text>

  <!-- Flex pattern: Badge row -->
  <text x="50" y="322" font-size="11" font-weight="600" fill="#fbbf24">Badges / Tags</text>
  <rect x="50" y="330" width="270" height="36" rx="6" fill="#1c1702" stroke="#854d0e" stroke-width="1"/>
  <rect x="60" y="338" width="42" height="18" rx="9" fill="#78350f"/>
  <text x="81" y="351" text-anchor="middle" font-size="8" fill="#fcd34d">React</text>
  <rect x="110" y="338" width="50" height="18" rx="9" fill="#78350f"/>
  <text x="135" y="351" text-anchor="middle" font-size="8" fill="#fcd34d">Tailwind</text>
  <rect x="168" y="338" width="40" height="18" rx="9" fill="#78350f"/>
  <text x="188" y="351" text-anchor="middle" font-size="8" fill="#fcd34d">Next.js</text>
  <text x="185" y="382" text-anchor="middle" font-size="9" fill="#64748b">flex flex-wrap gap-2</text>

  <!-- Flex pattern: User list -->
  <text x="50" y="404" font-size="11" font-weight="600" fill="#fbbf24">Lista de usuarios</text>
  <!-- user row 1 -->
  <rect x="50" y="412" width="270" height="36" rx="6" fill="#1c1702" stroke="#854d0e" stroke-width="1"/>
  <circle cx="70" cy="430" r="10" fill="#92400e"/>
  <text x="70" y="434" text-anchor="middle" font-size="8" fill="#fcd34d">AB</text>
  <text x="90" y="427" font-size="9" fill="#fbbf24">Ana Benítez</text>
  <text x="90" y="438" font-size="8" fill="#a16207">Designer</text>
  <rect x="270" y="420" width="40" height="18" rx="4" fill="#78350f"/>
  <text x="290" y="433" text-anchor="middle" font-size="8" fill="#fcd34d">Follow</text>
  <text x="185" y="464" text-anchor="middle" font-size="9" fill="#64748b">flex items-center justify-between</text>

  <!-- Flex rule box -->
  <rect x="50" y="490" width="270" height="58" rx="8" fill="#1c1702" stroke="#fbbf24" stroke-width="1"/>
  <text x="185" y="512" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">Usa Flexbox cuando:</text>
  <text x="185" y="528" text-anchor="middle" font-size="9" fill="#fcd34d">· Los ítems van en UNA sola línea</text>
  <text x="185" y="542" text-anchor="middle" font-size="9" fill="#fcd34d">· El tamaño es dinámico (crece/encoge)</text>

  <!-- ─── GRID PANEL (right) ─── -->
  <rect x="620" y="82" width="310" height="480" rx="12" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="620" y="82" width="310" height="48" rx="12" fill="#020e1a"/>
  <rect x="620" y="112" width="310" height="18" rx="0" fill="#020e1a"/>
  <text x="775" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#38bdf8">Grid</text>
  <text x="775" y="128" text-anchor="middle" font-size="10" fill="#0369a1">Diseño bidimensional (filas y columnas)</text>

  <!-- Grid pattern: Features section -->
  <text x="640" y="158" font-size="11" font-weight="600" fill="#38bdf8">Sección de Features</text>
  <rect x="640" y="166" width="270" height="52" rx="6" fill="#020e1a" stroke="#0369a1" stroke-width="1"/>
  <rect x="648" y="174" width="78" height="36" rx="4" fill="#0c2d48"/>
  <text x="687" y="196" text-anchor="middle" font-size="8" fill="#7dd3fc">Feature 1</text>
  <rect x="734" y="174" width="78" height="36" rx="4" fill="#0c2d48"/>
  <text x="773" y="196" text-anchor="middle" font-size="8" fill="#7dd3fc">Feature 2</text>
  <rect x="820" y="174" width="78" height="36" rx="4" fill="#0c2d48"/>
  <text x="859" y="196" text-anchor="middle" font-size="8" fill="#7dd3fc">Feature 3</text>
  <text x="775" y="230" text-anchor="middle" font-size="9" fill="#64748b">grid grid-cols-3 gap-6</text>

  <!-- Grid pattern: Pricing cards -->
  <text x="640" y="250" font-size="11" font-weight="600" fill="#38bdf8">Pricing Cards</text>
  <rect x="640" y="258" width="270" height="52" rx="6" fill="#020e1a" stroke="#0369a1" stroke-width="1"/>
  <rect x="648" y="266" width="74" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
  <text x="685" y="288" text-anchor="middle" font-size="8" fill="#64748b">Free</text>
  <rect x="730" y="262" width="80" height="44" rx="4" fill="#0c2d48" stroke="#38bdf8" stroke-width="2"/>
  <text x="770" y="285" text-anchor="middle" font-size="8" font-weight="700" fill="#38bdf8">Pro ⭐</text>
  <rect x="818" y="266" width="74" height="36" rx="4" fill="#0f172a" stroke="#334155"/>
  <text x="855" y="288" text-anchor="middle" font-size="8" fill="#64748b">Enterprise</text>
  <text x="775" y="322" text-anchor="middle" font-size="9" fill="#64748b">grid grid-cols-3 items-start</text>

  <!-- Grid pattern: Gallery -->
  <text x="640" y="342" font-size="11" font-weight="600" fill="#38bdf8">Galería de imágenes</text>
  <rect x="640" y="350" width="270" height="52" rx="6" fill="#020e1a" stroke="#0369a1" stroke-width="1"/>
  <rect x="648" y="358" width="50" height="36" rx="3" fill="#0c2d48"/>
  <rect x="704" y="358" width="50" height="36" rx="3" fill="#0c2d48"/>
  <rect x="760" y="358" width="50" height="36" rx="3" fill="#0c2d48"/>
  <rect x="816" y="358" width="50" height="36" rx="3" fill="#0c2d48"/>
  <rect x="648" y="396" width="110" height="0" rx="3" fill="#0c2d48"/>
  <text x="775" y="414" text-anchor="middle" font-size="9" fill="#64748b">grid-cols-[repeat(auto-fill,minmax(250px,1fr))]</text>

  <!-- Grid pattern: Page layout -->
  <text x="640" y="434" font-size="11" font-weight="600" fill="#38bdf8">Layout de página</text>
  <rect x="640" y="442" width="270" height="68" rx="6" fill="#020e1a" stroke="#0369a1" stroke-width="1"/>
  <!-- header full -->
  <rect x="648" y="450" width="254" height="14" rx="2" fill="#1e3a5f"/>
  <text x="775" y="461" text-anchor="middle" font-size="7" fill="#38bdf8">header (col-span-full)</text>
  <!-- sidebar + main -->
  <rect x="648" y="468" width="60" height="24" rx="2" fill="#0c2d48"/>
  <text x="678" y="484" text-anchor="middle" font-size="7" fill="#7dd3fc">sidebar</text>
  <rect x="712" y="468" width="190" height="24" rx="2" fill="#0f172a" stroke="#1e3a5f"/>
  <text x="807" y="484" text-anchor="middle" font-size="7" fill="#64748b">main content (1fr)</text>

  <!-- Grid rule box -->
  <rect x="640" y="490" width="270" height="58" rx="8" fill="#020e1a" stroke="#38bdf8" stroke-width="1"/>
  <text x="775" y="512" text-anchor="middle" font-size="10" font-weight="700" fill="#38bdf8">Usa Grid cuando:</text>
  <text x="775" y="528" text-anchor="middle" font-size="9" fill="#7dd3fc">· Necesitas alinear en FILAS y COLUMNAS</text>
  <text x="775" y="542" text-anchor="middle" font-size="9" fill="#7dd3fc">· El layout tiene celdas de distintos tamaños</text>

  <!-- ─── CENTER: Combined approach ─── -->
  <rect x="360" y="200" width="240" height="100" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="480" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">Patrón combinado</text>
  <text x="480" y="240" text-anchor="middle" font-size="9" fill="#7c3aed">Grid macro-layout</text>
  <text x="480" y="255" text-anchor="middle" font-size="9" fill="#c4b5fd">features, pricing, testimonios</text>
  <line x1="480" y1="260" x2="480" y2="270" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="480" y="283" text-anchor="middle" font-size="9" fill="#7c3aed">Flex dentro de cada card</text>
  <text x="480" y="296" text-anchor="middle" font-size="9" fill="#c4b5fd">navbar, botones, avatar+nombre</text>

  <!-- bottom tip -->
  <text x="480" y="575" text-anchor="middle" font-size="10" fill="#475569">💡 Tip: Grid para la estructura de página, Flexbox para los componentes internos</text>
</svg>
