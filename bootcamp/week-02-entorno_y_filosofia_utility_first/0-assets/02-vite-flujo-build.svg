<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="380" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">Flujo de Build — Vite + TailwindCSS v4</text>

  <!-- DEV MODE -->
  <text x="400" y="66" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600" letter-spacing="2">MODO DESARROLLO (pnpm dev)</text>

  <!-- Source files -->
  <rect x="40" y="84" width="130" height="114" rx="8" fill="#1e293b"/>
  <text x="105" y="104" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Archivos fuente</text>
  <rect x="52" y="112" width="106" height="18" rx="3" fill="#0f172a"/>
  <text x="105" y="125" text-anchor="middle" fill="#7dd3fc" font-size="9" font-family="monospace">index.html</text>
  <rect x="52" y="134" width="106" height="18" rx="3" fill="#0f172a"/>
  <text x="105" y="147" text-anchor="middle" fill="#7dd3fc" font-size="9" font-family="monospace">src/main.js</text>
  <rect x="52" y="156" width="106" height="18" rx="3" fill="#0f172a"/>
  <text x="105" y="169" text-anchor="middle" fill="#38bdf8" font-size="9" font-family="monospace">src/style.css</text>

  <!-- Arrow 1 -->
  <line x1="172" y1="141" x2="218" y2="141" stroke="#334155" stroke-width="2"/>
  <polygon points="218,136 228,141 218,146" fill="#334155"/>

  <!-- Vite dev server -->
  <rect x="230" y="84" width="140" height="114" rx="8" fill="#0c1a4d"/>
  <text x="300" y="104" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600">Vite Dev Server</text>
  <text x="300" y="124" text-anchor="middle" fill="#93c5fd" font-size="9">ES Modules nativos</text>
  <text x="300" y="140" text-anchor="middle" fill="#93c5fd" font-size="9">No bundlea en dev</text>
  <text x="300" y="158" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">HMR al guardar</text>
  <rect x="242" y="166" width="116" height="16" rx="3" fill="#172554"/>
  <text x="300" y="178" text-anchor="middle" fill="#93c5fd" font-size="8" font-family="monospace">localhost:5173</text>

  <!-- Arrow 2 -->
  <line x1="372" y1="141" x2="418" y2="141" stroke="#334155" stroke-width="2"/>
  <polygon points="418,136 428,141 418,146" fill="#334155"/>

  <!-- Tailwind JIT -->
  <rect x="430" y="84" width="140" height="114" rx="8" fill="#164e63"/>
  <text x="500" y="104" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600">Tailwind JIT</text>
  <text x="500" y="122" text-anchor="middle" fill="#7dd3fc" font-size="9">Escanea HTML + JS</text>
  <text x="500" y="138" text-anchor="middle" fill="#7dd3fc" font-size="9">Genera solo clases usadas</text>
  <text x="500" y="154" text-anchor="middle" fill="#7dd3fc" font-size="9">Tiempo real (~5ms)</text>
  <rect x="442" y="164" width="116" height="18" rx="3" fill="#0c4a6e"/>
  <text x="500" y="177" text-anchor="middle" fill="#38bdf8" font-size="9" font-family="monospace">@import "tailwindcss"</text>

  <!-- Arrow 3 -->
  <line x1="572" y1="141" x2="618" y2="141" stroke="#334155" stroke-width="2"/>
  <polygon points="618,136 628,141 618,146" fill="#334155"/>

  <!-- Browser -->
  <rect x="630" y="84" width="130" height="114" rx="8" fill="#1e293b"/>
  <text x="695" y="104" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Browser</text>
  <text x="695" y="124" text-anchor="middle" fill="#86efac" font-size="9">HTML renderizado</text>
  <text x="695" y="140" text-anchor="middle" fill="#86efac" font-size="9">CSS aplicado</text>
  <text x="695" y="156" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">Vista en tiempo real</text>
  <text x="695" y="174" text-anchor="middle" fill="#64748b" font-size="9">⟳ HMR sin reload</text>

  <!-- Separator line -->
  <line x1="40" y1="218" x2="760" y2="218" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="400" y="238" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600" letter-spacing="2">MODO PRODUCCIÓN (pnpm build)</text>

  <!-- Prod boxes -->
  <!-- Source -->
  <rect x="40" y="252" width="130" height="86" rx="8" fill="#1e293b"/>
  <text x="105" y="272" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Archivos fuente</text>
  <text x="105" y="292" text-anchor="middle" fill="#7dd3fc" font-size="9">Todos los archivos</text>
  <text x="105" y="308" text-anchor="middle" fill="#7dd3fc" font-size="9">HTML + JS + CSS</text>
  <text x="105" y="324" text-anchor="middle" fill="#64748b" font-size="8">~3MB si todo Tailwind</text>

  <!-- Arrow -->
  <line x1="172" y1="295" x2="228" y2="295" stroke="#334155" stroke-width="2"/>
  <polygon points="228,290 238,295 228,300" fill="#334155"/>

  <!-- Vite build (Rollup) -->
  <rect x="240" y="252" width="230" height="86" rx="8" fill="#0c1a4d"/>
  <text x="355" y="272" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600">Vite Build (Rollup + Tailwind)</text>
  <text x="355" y="292" text-anchor="middle" fill="#93c5fd" font-size="9">Purge CSS → solo clases usadas</text>
  <text x="355" y="308" text-anchor="middle" fill="#93c5fd" font-size="9">Minificación JS + CSS</text>
  <text x="355" y="324" text-anchor="middle" fill="#93c5fd" font-size="9">Hash de nombres de archivo</text>

  <!-- Arrow -->
  <line x1="472" y1="295" x2="518" y2="295" stroke="#334155" stroke-width="2"/>
  <polygon points="518,290 528,295 518,300" fill="#334155"/>

  <!-- dist/ output -->
  <rect x="530" y="252" width="230" height="86" rx="8" fill="#052e16"/>
  <text x="645" y="272" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">dist/ (listo para deploy)</text>
  <rect x="542" y="280" width="206" height="14" rx="3" fill="#0f172a"/>
  <text x="645" y="291" text-anchor="middle" fill="#86efac" font-size="8" font-family="monospace">index.html — optimizado</text>
  <rect x="542" y="298" width="206" height="14" rx="3" fill="#0f172a"/>
  <text x="645" y="309" text-anchor="middle" fill="#38bdf8" font-size="8" font-family="monospace">assets/index-[hash].css — 10-50KB ✅</text>
  <rect x="542" y="316" width="206" height="14" rx="3" fill="#0f172a"/>
  <text x="645" y="327" text-anchor="middle" fill="#86efac" font-size="8" font-family="monospace">assets/index-[hash].js — minificado</text>

  <text x="400" y="365" text-anchor="middle" fill="#475569" font-size="10">El purging convierte ~3MB de CSS completo en 10-50KB gracias al JIT Scanner</text>
</svg>
