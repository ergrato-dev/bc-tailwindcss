<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="420" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">CSS Tradicional vs Utility-First (Tailwind)</text>

  <!-- LEFT PANEL: CSS Tradicional -->
  <rect x="30" y="56" width="355" height="330" rx="10" fill="#1e293b"/>
  <text x="207" y="82" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">❌  CSS Tradicional</text>

  <!-- HTML side (left panel) -->
  <rect x="44" y="94" width="155" height="110" rx="6" fill="#0f172a"/>
  <text x="120" y="111" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">HTML</text>
  <text x="52" y="127" fill="#94a3b8" font-size="9" font-family="monospace">&lt;div class="card"&gt;</text>
  <text x="60" y="141" fill="#94a3b8" font-size="9" font-family="monospace">&lt;h2 class="card-title"&gt;</text>
  <text x="68" y="155" fill="#e2e8f0" font-size="9" font-family="monospace">Producto</text>
  <text x="60" y="169" fill="#94a3b8" font-size="9" font-family="monospace">&lt;/h2&gt;</text>
  <text x="52" y="183" fill="#94a3b8" font-size="9" font-family="monospace">&lt;/div&gt;</text>

  <!-- CSS side (left panel) -->
  <rect x="209" y="94" width="162" height="195" rx="6" fill="#0f172a"/>
  <text x="289" y="111" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">CSS</text>
  <text x="217" y="127" fill="#94a3b8" font-size="9" font-family="monospace">.card {</text>
  <text x="225" y="141" fill="#7dd3fc" font-size="9" font-family="monospace">  background: white;</text>
  <text x="225" y="155" fill="#7dd3fc" font-size="9" font-family="monospace">  border-radius: .5rem;</text>
  <text x="225" y="169" fill="#7dd3fc" font-size="9" font-family="monospace">  padding: 1.5rem;</text>
  <text x="225" y="183" fill="#7dd3fc" font-size="9" font-family="monospace">  box-shadow: 0 1px 3px</text>
  <text x="225" y="197" fill="#7dd3fc" font-size="9" font-family="monospace">    rgba(0,0,0,.1);</text>
  <text x="217" y="211" fill="#94a3b8" font-size="9" font-family="monospace">}</text>
  <text x="217" y="227" fill="#94a3b8" font-size="9" font-family="monospace">.card-title {</text>
  <text x="225" y="241" fill="#7dd3fc" font-size="9" font-family="monospace">  font-size: 1.125rem;</text>
  <text x="225" y="255" fill="#7dd3fc" font-size="9" font-family="monospace">  font-weight: 600;</text>
  <text x="225" y="269" fill="#7dd3fc" font-size="9" font-family="monospace">  color: #111827;</text>
  <text x="217" y="283" fill="#94a3b8" font-size="9" font-family="monospace">}</text>

  <!-- Problems (left panel) -->
  <rect x="44" y="220" width="155" height="148" rx="6" fill="#450a0a"/>
  <text x="120" y="237" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Problemas</text>
  <text x="52" y="255" fill="#fca5a5" font-size="9">⚠ Naming fatigue</text>
  <text x="52" y="273" fill="#fca5a5" font-size="9">⚠ CSS crece sin parar</text>
  <text x="52" y="291" fill="#fca5a5" font-size="9">⚠ Conflictos de cascade</text>
  <text x="52" y="309" fill="#fca5a5" font-size="9">⚠ Context switching</text>
  <text x="52" y="327" fill="#fca5a5" font-size="9">⚠ Reglas globales</text>
  <text x="52" y="345" fill="#fca5a5" font-size="9">⚠ Difícil de eliminar</text>

  <!-- DIVIDER -->
  <line x1="400" y1="56" x2="400" y2="386" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="400" cy="221" r="20" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="225" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700">vs</text>

  <!-- RIGHT PANEL: Utility-First -->
  <rect x="415" y="56" width="355" height="330" rx="10" fill="#1e293b"/>
  <text x="592" y="82" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">✅  Utility-First (Tailwind)</text>

  <!-- HTML side (right panel) -->
  <rect x="429" y="94" width="327" height="190" rx="6" fill="#0f172a"/>
  <text x="592" y="111" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">HTML con clases Tailwind</text>
  <text x="437" y="128" fill="#94a3b8" font-size="9" font-family="monospace">&lt;div class="</text>
  <text x="437" y="144" fill="#38bdf8" font-size="9" font-family="monospace">  rounded-lg bg-white p-6 shadow-sm</text>
  <text x="437" y="158" fill="#94a3b8" font-size="9" font-family="monospace">"&gt;</text>
  <text x="445" y="174" fill="#94a3b8" font-size="9" font-family="monospace">&lt;h2 class="</text>
  <text x="445" y="190" fill="#38bdf8" font-size="9" font-family="monospace">  text-lg font-semibold text-gray-900</text>
  <text x="445" y="204" fill="#94a3b8" font-size="9" font-family="monospace">"&gt;Producto&lt;/h2&gt;</text>
  <text x="437" y="220" fill="#94a3b8" font-size="9" font-family="monospace">&lt;/div&gt;  </text>
  <text x="610" y="268" fill="#86efac" font-size="9" font-family="monospace">0 líneas de CSS</text>

  <!-- Benefits -->
  <rect x="429" y="302" width="327" height="66" rx="6" fill="#052e16"/>
  <text x="592" y="319" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">Ventajas</text>
  <text x="437" y="336" fill="#86efac" font-size="9">✓ Sin inventar nombres   ✓ Cambios = cambiar clases HTML</text>
  <text x="437" y="352" fill="#86efac" font-size="9">✓ Sin conflictos globales  ✓ IntelliSense completo</text>
  <text x="437" y="368" fill="#86efac" font-size="9">✓ CSS purgado (~10-50KB)  ✓ Diseño consistente</text>

  <!-- Bottom caption -->
  <text x="400" y="405" text-anchor="middle" fill="#475569" font-size="10">Ambos producen el mismo resultado visual — Tailwind es más rápido de mantener</text>
</svg>
