<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">Estructura de Proyecto — Vite + TailwindCSS v4</text>

  <!-- File tree panel -->
  <rect x="40" y="54" width="310" height="316" rx="10" fill="#1e293b"/>
  <text x="195" y="78" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="700">📁 mi-proyecto/</text>

  <!-- Files -->
  <!-- index.html -->
  <rect x="58" y="90" width="278" height="26" rx="4" fill="#0c4a6e"/>
  <text x="72" y="107" fill="#7dd3fc" font-size="10" font-family="monospace">📄 index.html</text>
  <text x="280" y="107" text-anchor="end" fill="#38bdf8" font-size="9">punto de entrada</text>

  <!-- package.json -->
  <rect x="58" y="122" width="278" height="26" rx="4" fill="#164e63"/>
  <text x="72" y="139" fill="#7dd3fc" font-size="10" font-family="monospace">📄 package.json</text>
  <text x="280" y="139" text-anchor="end" fill="#94a3b8" font-size="9">deps + scripts</text>

  <!-- vite.config.js -->
  <rect x="58" y="154" width="278" height="26" rx="4" fill="#0c1a4d"/>
  <text x="72" y="171" fill="#93c5fd" font-size="10" font-family="monospace">⚙️  vite.config.js</text>
  <text x="280" y="171" text-anchor="end" fill="#38bdf8" font-size="9">Tailwind plugin</text>

  <!-- pnpm-lock -->
  <rect x="58" y="186" width="278" height="26" rx="4" fill="#1e293b"/>
  <text x="72" y="203" fill="#475569" font-size="10" font-family="monospace">🔒 pnpm-lock.yaml</text>
  <text x="280" y="203" text-anchor="end" fill="#475569" font-size="9">no editar</text>

  <!-- .gitignore -->
  <rect x="58" y="218" width="278" height="26" rx="4" fill="#1e293b"/>
  <text x="72" y="235" fill="#475569" font-size="10" font-family="monospace">🙈 .gitignore</text>
  <text x="280" y="235" text-anchor="end" fill="#475569" font-size="9">node_modules, dist/</text>

  <!-- src/ folder -->
  <rect x="58" y="254" width="278" height="26" rx="4" fill="#1e293b"/>
  <text x="72" y="271" fill="#fbbf24" font-size="10" font-family="monospace">📁 src/</text>
  <text x="280" y="271" text-anchor="end" fill="#d97706" font-size="9">código fuente</text>

  <rect x="74" y="284" width="262" height="22" rx="4" fill="#0f172a"/>
  <text x="88" y="299" fill="#38bdf8" font-size="10" font-family="monospace">📄 style.css</text>
  <text x="280" y="299" text-anchor="end" fill="#38bdf8" font-size="9">@import "tailwindcss"</text>

  <rect x="74" y="310" width="262" height="22" rx="4" fill="#0f172a"/>
  <text x="88" y="325" fill="#94a3b8" font-size="10" font-family="monospace">📄 main.js</text>
  <text x="280" y="325" text-anchor="end" fill="#94a3b8" font-size="9">importa style.css</text>

  <!-- public/ -->
  <rect x="58" y="337" width="278" height="22" rx="4" fill="#1e293b"/>
  <text x="72" y="352" fill="#64748b" font-size="10" font-family="monospace">📁 public/</text>
  <text x="280" y="352" text-anchor="end" fill="#475569" font-size="9">assets estáticos</text>

  <!-- RIGHT: Explanation cards -->

  <!-- vite.config.js detail -->
  <rect x="380" y="54" width="380" height="116" rx="10" fill="#0c1a4d"/>
  <text x="400" y="75" fill="#38bdf8" font-size="11" font-weight="600">⚙️  vite.config.js</text>
  <text x="400" y="95" fill="#7dd3fc" font-size="9" font-family="monospace">import { defineConfig } from 'vite'</text>
  <text x="400" y="111" fill="#7dd3fc" font-size="9" font-family="monospace">import tailwindcss from '@tailwindcss/vite'</text>
  <text x="400" y="127" fill="#7dd3fc" font-size="9" font-family="monospace">export default defineConfig({</text>
  <text x="400" y="143" fill="#38bdf8" font-size="9" font-family="monospace">  plugins: [ tailwindcss() ],</text>
  <text x="400" y="159" fill="#7dd3fc" font-size="9" font-family="monospace">})</text>

  <!-- style.css detail -->
  <rect x="380" y="182" width="380" height="88" rx="10" fill="#164e63"/>
  <text x="400" y="204" fill="#38bdf8" font-size="11" font-weight="600">🎨  src/style.css</text>
  <text x="400" y="224" fill="#7dd3fc" font-size="9" font-family="monospace">/* Única directiva necesaria en v4 */</text>
  <text x="400" y="241" fill="#38bdf8" font-size="12" font-family="monospace" font-weight="700">@import "tailwindcss";</text>
  <text x="400" y="260" fill="#7dd3fc" font-size="9" font-family="monospace">/* Tus estilos custom después */</text>

  <!-- package.json detail -->
  <rect x="380" y="282" width="380" height="88" rx="10" fill="#1e293b"/>
  <text x="400" y="302" fill="#38bdf8" font-size="11" font-weight="600">📦  devDependencies</text>
  <text x="400" y="322" fill="#94a3b8" font-size="9" font-family="monospace">"tailwindcss": "^4.x.x"</text>
  <text x="400" y="338" fill="#94a3b8" font-size="9" font-family="monospace">"@tailwindcss/vite": "^4.x.x"</text>
  <text x="400" y="354" fill="#94a3b8" font-size="9" font-family="monospace">"vite": "^6.x.x"</text>

  <text x="400" y="388" fill="#475569" font-size="10">Todos son devDependencies — solo se usan en el proceso de build, no en el browser</text>
</svg>
